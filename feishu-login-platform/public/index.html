<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>飞书登录平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="brand-panel" aria-label="平台概览">
        <div class="brand-mark">飞</div>
        <p class="eyebrow">企业身份入口</p>
        <h1>飞书授权登录</h1>
        <p class="intro">使用飞书自建应用完成身份认证，登录后由服务端维护会话并保护业务接口。</p>
        <div class="flow-strip" aria-hidden="true">
          <span>授权</span>
          <span>回调</span>
          <span>会话</span>
        </div>
      </section>

      <section class="login-panel" aria-label="登录">
        <div>
          <p class="eyebrow">Feishu OAuth</p>
          <h2>进入工作台</h2>
          <p class="muted">点击后会跳转到飞书授权页。授权成功后，飞书会把你带回当前平台。</p>
        </div>

        <button class="feishu-button" id="loginButton" type="button">
          <span class="button-icon">飞</span>
          <span>使用飞书登录</span>
        </button>

        <p class="tiny">
          回调地址需要在飞书开放平台后台配置为
          <code>http://localhost:3000/auth/feishu/callback</code>
        </p>
      </section>
    </main>
    <script src="/login.js"></script>
  </body>
</html>
