services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: feishu_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feishu_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  feishu-login-platform:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/feishu_platform
      FEISHU_BASE_EXPORT_DIR: /feishu_base_export
    volumes:
      - ./data:/app/data
      - ../feishu_base_export:/feishu_base_export
    restart: unless-stopped

volumes:
  postgres-data:
