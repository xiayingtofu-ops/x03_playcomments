<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>X03 反馈平台</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --panel: #ffffff;
      --line: #e5eaf3;
      --text: #172033;
      --muted: #667085;
      --soft: #f1f5fb;
      --blue: #2168f3;
      --blue-soft: #eaf1ff;
      --red: #ef4444;
      --green: #16a34a;
      --orange: #f97316;
      --purple: #7c3aed;
      --shadow: 0 12px 32px rgba(16, 24, 40, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 248px minmax(720px, 1fr) 300px;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1a73ff, #38a3ff);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(33, 104, 243, 0.28);
    }

    .brand b {
      display: block;
      font-size: 16px;
    }

    .brand span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .nav {
      display: grid;
      gap: 7px;
    }

    .nav button {
      height: 38px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #344054;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
    }

    .nav button.active {
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 700;
    }

    .nav svg {
      width: 17px;
      height: 17px;
      stroke-width: 2;
      flex: 0 0 auto;
    }

    .profile {
      margin-top: auto;
      border-top: 1px solid var(--line);
      padding-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a7f3d0, #60a5fa);
    }

    .profile b {
      display: block;
      font-size: 14px;
    }

    .profile span {
      color: var(--muted);
      font-size: 12px;
    }

    .main {
      padding: 24px 28px 40px;
      min-width: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      font-size: 14px;
    }

    .submit {
      border: 0;
      height: 48px;
      padding: 0 18px;
      border-radius: 11px;
      background: var(--blue);
      color: white;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(33, 104, 243, 0.28);
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .auth-widget {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #475467;
      font-size: 13px;
    }

    .auth-card {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px 0 8px;
      box-shadow: 0 6px 14px rgba(16, 24, 40, 0.05);
    }

    .auth-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 900;
    }

    .auth-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .auth-action {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #344054;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    .auth-action.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .auth-action:disabled {
      cursor: not-allowed;
      opacity: 0.68;
    }

    .toolbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 12px;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 150px 150px 130px;
      gap: 12px;
      margin-bottom: 18px;
    }

    .search {
      position: relative;
    }

    .search svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #98a2b3;
      width: 18px;
      height: 18px;
    }

    .toolbar input,
    .toolbar select {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: #344054;
      padding: 0 12px;
      outline: none;
    }

    .toolbar input {
      padding-left: 42px;
    }

    .tabs {
      display: flex;
      gap: 26px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
    }

    .tab {
      border: 0;
      background: transparent;
      padding: 0 0 12px;
      color: #475467;
      cursor: pointer;
      font-weight: 700;
      position: relative;
    }

    .tab.active {
      color: var(--blue);
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      border-radius: 2px;
      background: var(--blue);
    }

    .feed {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 11px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .app.settings-view {
      grid-template-columns: 248px minmax(0, 1fr);
    }

    .app.planner-view {
      grid-template-columns: 248px minmax(0, 1fr);
    }

    .app.settings-view .right,
    .app.planner-view .right,
    .main.settings-mode .submit,
    .main.settings-mode .toolbar,
    .main.settings-mode .tabs,
    .main.settings-mode .pager,
    .main.planner-mode .toolbar,
    .main.planner-mode .tabs,
    .main.planner-mode .pager {
      display: none;
    }

    .main.settings-mode .topbar,
    .main.planner-mode .topbar {
      display: block;
      margin-bottom: 22px;
    }

    .main.settings-mode .feed,
    .main.planner-mode .feed {
      background: transparent;
      border: 0;
      border-radius: 0;
      overflow: visible;
      box-shadow: none;
    }

    .section-kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 24px;
      border-radius: 12px;
      padding: 0 12px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .settings-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
    }

    .settings-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 24px;
      min-height: 400px;
      box-shadow: 0 10px 24px rgba(16, 24, 40, 0.04);
    }

    .settings-card h2 {
      margin: 0 0 26px;
      font-size: 18px;
      line-height: 1.35;
    }

    .preference-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 19px 0;
      border-bottom: 1px solid var(--line);
    }

    .preference-row:last-child {
      border-bottom: 0;
    }

    .preference-row b {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .preference-row p {
      margin: 0;
      color: #5b667a;
      font-size: 13px;
    }

    .switch {
      position: relative;
      width: 34px;
      height: 20px;
      display: inline-flex;
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .switch span {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #cfd7e6;
      cursor: pointer;
      transition: 0.16s ease;
    }

    .switch span::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.22);
      transition: 0.16s ease;
    }

    .switch input:checked + span {
      background: var(--blue);
    }

    .switch input:checked + span::after {
      transform: translateX(14px);
    }

    .notification-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }

    .notification-head h2 {
      margin-bottom: 6px;
    }

    .notification-head p {
      margin: 0;
      color: #667085;
      font-size: 13px;
    }

    .read-all {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #344054;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .notification-list {
      display: grid;
      gap: 10px;
    }

    .notification-item {
      border: 1px solid #bfd2ff;
      background: #f3f7ff;
      border-radius: 8px;
      padding: 13px;
    }

    .notification-item.read {
      border-color: var(--line);
      background: #fbfdff;
      opacity: 0.78;
    }

    .notification-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #667085;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .notification-type {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid #bfd2ff;
      background: #fff;
      color: #344054;
      border-radius: 7px;
      padding: 2px 8px;
      font-weight: 700;
    }

    .notification-title {
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.45;
    }

    .notification-body {
      color: #5b667a;
      font-size: 13px;
    }

    .planner-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 18px;
    }

    .planner-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .summary-card {
      border: 1px solid transparent;
      background: #fff;
      border-radius: 10px;
      min-height: 86px;
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(16, 24, 40, 0.04);
    }

    .summary-card.active {
      border-color: var(--blue);
      background: #f5f8ff;
    }

    .summary-icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: #eef4ff;
      color: var(--blue);
    }

    .summary-card:nth-child(2) .summary-icon { background: #fef9c3; color: #a16207; }
    .summary-card:nth-child(3) .summary-icon { background: #e0f2fe; color: #0369a1; }
    .summary-card:nth-child(4) .summary-icon { background: #dcfce7; color: #047857; }

    .summary-number {
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
    }

    .summary-label {
      margin-top: 6px;
      color: #667085;
      font-size: 13px;
    }

    .planner-filter-panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdff;
      padding: 16px;
      margin-bottom: 20px;
    }

    .planner-filter-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .planner-filters {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 150px 150px 150px 150px 88px;
      gap: 12px;
    }

    .planner-filters input,
    .planner-filters select,
    .planner-filters button {
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: #344054;
      padding: 0 12px;
      outline: none;
      font: inherit;
    }

    .planner-filters button {
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    .planner-table-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      overflow: auto;
      box-shadow: 0 10px 24px rgba(16, 24, 40, 0.04);
    }

    .planner-table {
      width: 100%;
      min-width: 1180px;
      border-collapse: collapse;
      font-size: 13px;
    }

    .planner-table th,
    .planner-table td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    .planner-table th {
      background: #fbfdff;
      font-weight: 800;
      color: #344054;
      white-space: nowrap;
    }

    .planner-table tr:last-child td {
      border-bottom: 0;
    }

    .feedback-cell {
      max-width: 360px;
      line-height: 1.55;
      font-weight: 650;
    }

    .remark-cell {
      max-width: 250px;
      color: #475467;
      line-height: 1.5;
    }

    .truncate-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .owner-chip,
    .priority-chip,
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      border-radius: 999px;
      padding: 0 10px;
      border: 1px solid var(--line);
      white-space: nowrap;
    }

    .owner-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #0f172a;
      background: #dcfce7;
      font-size: 12px;
      font-weight: 800;
    }

    .priority-chip.p0 { background: #fff1f2; border-color: #fecdd3; color: #e11d48; }
    .priority-chip.p1 { background: #fff7ed; border-color: #fed7aa; color: #ea580c; }
    .priority-chip.p2 { background: #fefce8; border-color: #fde68a; color: #a16207; }
    .priority-chip.p3 { background: #ecfccb; border-color: #bef264; color: #4d7c0f; }
    .status-chip.todo { background: #f8fafc; color: #475467; }
    .status-chip.doing { background: #eff6ff; border-color: #bfdbfe; color: #0369a1; }
    .status-chip.design { background: #fdf4ff; border-color: #f5d0fe; color: #a21caf; }
    .status-chip.done { background: #ecfdf5; border-color: #bbf7d0; color: #047857; }

    .heat-cell {
      white-space: nowrap;
      font-weight: 800;
    }

    .heat-cell span {
      display: block;
      color: #667085;
      font-weight: 500;
      font-size: 12px;
      margin-top: 3px;
    }

    .table-action {
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: #344054;
      padding: 0 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    .item {
      padding: 18px 18px 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .item:hover {
      background: #fbfdff;
    }

    .item:last-child {
      border-bottom: 0;
    }

    .labels {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 9px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      height: 24px;
      border-radius: 999px;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 700;
      background: var(--soft);
      color: #475467;
    }

    .pill.hot { color: #dc2626; background: #fff1f2; }
    .pill.p1 { color: #dc2626; background: #fee2e2; }
    .pill.p2 { color: #1d4ed8; background: #dbeafe; }
    .pill.doing { color: #047857; background: #dcfce7; }
    .pill.design { color: #7e22ce; background: #f3e8ff; }
    .pill.empty { color: #64748b; background: #eef2f7; }

    .item h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.45;
      letter-spacing: 0;
    }

    .item-title {
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      color: inherit;
      text-align: left;
      font: inherit;
      cursor: pointer;
    }

    .item-title:hover {
      color: var(--blue);
    }

    .excerpt {
      margin-top: 7px;
      color: #5b667a;
      font-size: 14px;
      line-height: 1.6;
      max-width: 820px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: pre-wrap;
    }

    .byline {
      margin-top: 9px;
      color: #7b8496;
      font-size: 13px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .attachment-thumbs {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .attachment-thumb {
      width: 58px;
      height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #f2f4f7;
      display: grid;
      place-items: center;
      color: #667085;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      flex: 0 0 auto;
      cursor: pointer;
      padding: 0;
    }

    .attachment-thumb img,
    .attachment-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .attachment-thumb.more {
      background: #eef2ff;
      color: #1d4ed8;
    }

    .metrics {
      min-width: 248px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 14px;
      color: #667085;
      align-self: center;
    }

    .metric {
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      white-space: nowrap;
      color: inherit;
    }

    .metric.like {
      color: #ef4444;
      font-weight: 700;
    }

    .metric.like.active {
      color: #e11d48;
    }

    .plus-one {
      min-width: 28px;
      height: 24px;
      border-radius: 7px;
      display: inline-grid;
      place-items: center;
      background: #fff1f2;
      color: #e11d48;
      font-weight: 900;
      line-height: 1;
    }

    .metric.follow.active {
      color: #f59e0b;
      font-weight: 700;
    }

    .metric.follow.active svg {
      fill: #fef3c7;
    }

    .metric svg {
      width: 19px;
      height: 19px;
    }

    .comment-panel {
      grid-column: 1 / -1;
      display: grid;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px dashed #edf1f7;
    }

    .comment-list {
      display: grid;
      gap: 8px;
    }

    .inline-comment {
      background: #f8fafc;
      border: 1px solid #edf1f7;
      border-radius: 9px;
      padding: 9px 10px;
      font-size: 13px;
    }

    .inline-comment b {
      margin-right: 8px;
      color: #344054;
    }

    .inline-comment span {
      color: #98a2b3;
      font-size: 12px;
    }

    .comment-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .comment-form input {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 0 12px;
      outline: none;
    }

    .comment-form button {
      height: 38px;
      border: 0;
      border-radius: 9px;
      background: var(--blue);
      color: #fff;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .right {
      padding: 24px 20px 40px 0;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(16, 24, 40, 0.05);
    }

    .card-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-weight: 800;
      font-size: 16px;
    }

    .card-title button {
      border: 0;
      background: transparent;
      color: var(--blue);
      cursor: pointer;
      font-weight: 700;
    }

    .topic,
    .reply {
      display: grid;
      gap: 4px;
      padding: 9px 0;
      border-bottom: 1px solid #edf1f7;
    }

    .topic:last-child,
    .reply:last-child {
      border-bottom: 0;
    }

    .topic-row {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: 14px;
    }

    .rank {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      background: #eef2f7;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      color: #64748b;
    }

    .rank.top1 { background: #fee2e2; color: #ef4444; }
    .rank.top2 { background: #ffedd5; color: #f97316; }
    .rank.top3 { background: #fef3c7; color: #d97706; }

    .topic-count {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .reply b {
      font-size: 14px;
      line-height: 1.45;
    }

    .reply span {
      color: var(--muted);
      font-size: 12px;
    }

    .tips {
      color: #5b667a;
      line-height: 1.8;
      font-size: 13px;
      margin: 0;
      padding-left: 17px;
    }

    .pager {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin-top: 18px;
    }

    .pager button {
      min-width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: #344054;
      cursor: pointer;
    }

    .pager button.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.52);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      z-index: 20;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(980px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.32);
    }

    .modal-head {
      position: sticky;
      top: 0;
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      z-index: 2;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.4;
    }

    .close {
      border: 0;
      background: var(--soft);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 20px;
    }

    .modal-body {
      padding: 18px 22px 24px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .detail {
      border: 1px solid #edf1f7;
      border-radius: 9px;
      padding: 10px;
      min-height: 58px;
    }

    .detail label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .detail div {
      overflow-wrap: anywhere;
      line-height: 1.45;
    }

    .remark {
      border: 1px solid #edf1f7;
      background: #fbfdff;
      border-radius: 9px;
      padding: 12px;
      white-space: pre-wrap;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .assets {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
      gap: 12px;
    }

    .asset {
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: #fbfdff;
      display: block;
      text-decoration: none;
      width: 100%;
      padding: 0;
      cursor: pointer;
    }

    .asset-media {
      aspect-ratio: 1 / 1;
      background: #eef2f7;
      display: grid;
      place-items: center;
    }

    .asset img,
    .asset video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .asset-info {
      padding: 9px;
      font-size: 12px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .asset-info a {
      display: inline-block;
      margin-top: 4px;
      color: var(--blue);
      text-decoration: none;
    }

    .detail-actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .danger-action {
      height: 36px;
      border: 1px solid #fecdd3;
      border-radius: 8px;
      background: #fff1f2;
      color: #be123c;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 800;
    }

    .danger-action:hover {
      background: #ffe4e6;
    }

    .danger-action:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .media-dialog {
      width: min(980px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.28);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .media-head {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px 0 16px;
      color: #f8fafc;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .media-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
      font-size: 14px;
    }

    .media-close {
      border: 0;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      cursor: pointer;
      font-size: 20px;
    }

    .media-body {
      min-height: 220px;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .media-body img,
    .media-body video {
      max-width: 100%;
      max-height: calc(100vh - 112px);
      object-fit: contain;
      display: block;
    }

    .media-body video {
      width: 100%;
      background: #000;
    }

    .empty-state {
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 38px;
      text-align: center;
      color: var(--muted);
    }

    .submit-dialog {
      width: min(720px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
    }

    .submit-head {
      padding: 24px 24px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .submit-head h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.35;
    }

    .submit-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .submit-body {
      padding: 24px;
    }

    .form-row {
      margin-bottom: 22px;
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      font-weight: 700;
      color: #172033;
    }

    .required {
      color: var(--red);
    }

    .type-options {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .type-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .type-option span {
      height: 42px;
      padding: 0 18px;
      border-radius: 21px;
      border: 1px solid #d8dee8;
      background: #f3f5f8;
      color: #667085;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.16s ease;
    }

    .type-option input:checked + span {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
      box-shadow: 0 10px 22px rgba(33, 104, 243, 0.22);
    }

    .type-option svg {
      width: 17px;
      height: 17px;
    }

    .description-input {
      width: 100%;
      min-height: 160px;
      resize: vertical;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      padding: 13px 14px;
      color: #344054;
      outline: none;
      line-height: 1.6;
    }

    .description-input:focus {
      border-color: #8ab2ff;
      box-shadow: 0 0 0 3px rgba(33, 104, 243, 0.1);
    }

    .form-help {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .upload-zone {
      width: 96px;
      height: 96px;
      border: 1px dashed #cfd7e6;
      border-radius: 10px;
      background: #fbfcff;
      display: grid;
      place-items: center;
      color: #667085;
      cursor: pointer;
      text-align: center;
      gap: 4px;
    }

    .upload-zone.drag-over {
      border-color: var(--blue);
      background: #eff6ff;
      color: var(--blue);
    }

    .upload-zone svg {
      width: 24px;
      height: 24px;
      margin: 0 auto 5px;
    }

    .upload-zone b {
      display: block;
      color: #475467;
      font-size: 13px;
      margin-bottom: 3px;
    }

    .upload-zone span {
      font-size: 11px;
    }

    .file-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .file-chip {
      max-width: 210px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      background: #f8fafc;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #475467;
      font-size: 12px;
    }

    .file-chip span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-chip button {
      border: 0;
      background: transparent;
      color: #98a2b3;
      cursor: pointer;
      padding: 0;
      font-size: 16px;
      line-height: 1;
    }

    .submit-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 28px;
    }

    .ghost-action,
    .primary-action {
      height: 38px;
      border-radius: 19px;
      cursor: pointer;
      font-weight: 700;
    }

    .ghost-action {
      border: 1px solid #d8dee8;
      background: #fff;
      color: #172033;
    }

    .primary-action {
      border: 0;
      background: var(--blue);
      color: #fff;
    }

    .primary-action:disabled {
      cursor: not-allowed;
      opacity: 0.64;
    }

    .form-message {
      min-height: 20px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .form-message.error {
      color: var(--red);
    }

    .form-message.success {
      color: var(--green);
    }

    @media (max-width: 1180px) {
      .app {
        grid-template-columns: 86px minmax(0, 1fr);
      }

      .sidebar {
        padding: 18px 14px;
      }

      .brand div,
      .nav span,
      .profile div {
        display: none;
      }

      .right {
        display: none;
      }
    }

    @media (max-width: 780px) {
      .app {
        display: block;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        flex-direction: row;
        align-items: center;
      }

      .nav,
      .profile {
        display: none;
      }

      .main {
        padding: 18px 14px 34px;
      }

      .topbar,
      .item {
        grid-template-columns: 1fr;
        flex-direction: column;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .metrics {
        justify-content: flex-start;
      }

      .detail-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">□</div>
        <div>
          <b>X03 反馈平台</b>
          <span>游玩反馈管理</span>
        </div>
      </div>
      <nav class="nav">
        <button class="active" data-nav="plaza">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m3 10 9-7 9 7"/><path d="M5 9v11h14V9"/><path d="M9 20v-6h6v6"/></svg>
          <span>反馈广场</span>
        </button>
        <button data-nav="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19V5"/><path d="M8 19V9"/><path d="M12 19v-6"/><path d="M16 19V7"/><path d="M20 19H3"/></svg>
          <span>数据看板</span>
        </button>
        <button data-nav="planner-table">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M9 4v16"/><path d="M15 4v16"/></svg>
          <span>策划统计表</span>
        </button>
        <button data-nav="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span>通知设置</span>
        </button>
        <button data-nav="profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
          <span>个人中心</span>
        </button>
        <button data-nav="platform-settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/><path d="m15 5 3 3"/></svg>
          <span>平台设置</span>
        </button>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h1>反馈广场</h1>
          <div class="subtitle">看看大家遇到哪些问题，点赞支持你也遇到的，参与讨论帮助完善反馈</div>
        </div>
        <div class="top-actions">
          <div class="auth-widget" id="authWidget"></div>
          <button class="submit" id="topSubmit">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            提交反馈
          </button>
        </div>
      </div>

      <section class="toolbar">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" placeholder="搜索问题关键词，如：王虫、资源、技能" />
        </div>
        <select id="plannerFilter"><option value="">全部模块</option></select>
        <select id="priorityFilter"><option value="">全部类型</option></select>
        <select id="sortSelect">
          <option value="new">最新发布</option>
          <option value="hot" selected>最多点赞</option>
          <option value="assets">附件最多</option>
        </select>
      </section>

      <section class="tabs">
        <button class="tab active" data-filter="hot">热门</button>
        <button class="tab" data-filter="all">全部</button>
        <button class="tab" data-filter="mine">我的关注</button>
      </section>

      <section id="feed" class="feed"></section>
      <div id="pager" class="pager"></div>
    </main>

    <aside class="right">
      <section class="card">
        <div class="card-title"><span>活跃反馈人</span><button id="shuffleTopics">换一换</button></div>
        <div id="topics"></div>
      </section>
      <section class="card">
        <div class="card-title"><span>近期官方回复</span><button id="moreReplies">更多</button></div>
        <div id="replies"></div>
      </section>
      <section class="card">
        <div class="card-title">反馈小贴士</div>
        <ul class="tips">
          <li>提交前请先搜索，避免重复反馈</li>
          <li>描述越详细，越有助于问题解决</li>
          <li>附件和视频会保留在反馈详情里</li>
        </ul>
      </section>
    </aside>
  </div>

  <div class="modal-backdrop" id="submitModal">
    <form class="submit-dialog" id="submitForm">
      <div class="submit-head">
        <div>
          <h2>提交反馈</h2>
          <p>记录问题、建议或截图，提交后会直接出现在反馈广场里。</p>
        </div>
        <button type="button" class="close" id="closeSubmitModal">×</button>
      </div>
      <div class="submit-body">
        <div class="form-row">
          <div class="form-label">反馈类型 <span class="required">*</span></div>
          <div class="type-options">
            <label class="type-option">
              <input type="radio" name="feedbackType" value="战斗模块" checked />
              <span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m14.5 17.5-8-8L4 12l8 8 2.5-2.5Z"/><path d="m14 6 4-4 4 4-4 4"/><path d="m13 7 4 4"/></svg>
                战斗模块
              </span>
            </label>
            <label class="type-option">
              <input type="radio" name="feedbackType" value="系统模块" />
              <span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6V20a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1H4a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6V4a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 .6 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 .6 1h.1a2 2 0 1 1 0 4H20a1.7 1.7 0 0 0-.6 1Z"/></svg>
                系统模块
              </span>
            </label>
            <label class="type-option">
              <input type="radio" name="feedbackType" value="其他模块" />
              <span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h.01"/><path d="M12 12h.01"/><path d="M19 12h.01"/></svg>
                其他模块
              </span>
            </label>
          </div>
        </div>

        <div class="form-row">
          <label class="form-label" for="submitDescription">详细描述 <span class="required">*</span></label>
          <textarea id="submitDescription" class="description-input" placeholder="请详细描述游戏问题或建议，可直接粘贴图片、GIF 或视频到这里"></textarea>
          <div class="form-help" id="descriptionCounter">至少输入 10 个字符，当前已输入 0 个字符。可直接粘贴图片或视频作为附件。</div>
        </div>

        <div class="form-row">
          <div class="form-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21.44 11.05 12 20.49a6 6 0 0 1-8.49-8.49l9.44-9.44a4 4 0 0 1 5.66 5.66L9.17 17.66a2 2 0 1 1-2.83-2.83l8.49-8.49"/></svg>
            附件 <span class="form-help">（支持图片/GIF/视频，最多9个）</span>
          </div>
          <label class="upload-zone" for="submitFiles">
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8 12 3 7 8"/><path d="M12 3v12"/></svg>
              <b>上传文件</b>
              <span>粘贴/拖拽/上传</span>
            </span>
          </label>
          <input id="submitFiles" type="file" accept="image/*,video/*,.gif,.mp4,.mov,.webm,.m4v" multiple hidden />
          <div class="file-list" id="submitFileList"></div>
        </div>

        <div class="submit-actions">
          <button type="button" class="ghost-action" id="cancelSubmit">取消</button>
          <button type="submit" class="primary-action" id="confirmSubmit">提交反馈</button>
        </div>
        <div class="form-message" id="submitMessage"></div>
      </div>
    </form>
  </div>

  <div class="modal-backdrop" id="detailModal">
    <article class="modal">
      <div class="modal-head">
        <div>
          <div class="labels" id="modalLabels"></div>

  <script>
    const FIELD = {
      description: "fldHy9HQO9",
      screenshot: "fldmlme6mj",
      priority: "flddZqPy4y",
      status: "fldxB7QmPi",
      remark: "fldPTWrwky",
      planner: "fldubdP27N",
      proposer: "fldqXT3xTr",
      likeCount: "fldP1f1suK",
      createdTime: "fldvRZllDS",
      likeUsers: "fldoj9ibxW",
      problemImage: "fldftLhjJK",
      rating: "fldbBFvDCK"
    };

    const state = {
      records: [],
      activeTab: "hot",
      search: "",
      planner: "",
      priority: "",
      sort: "hot",
      navMode: "plaza",
      notificationSettings: [],
      notifications: [],
      unreadCount: 0,
      currentUser: null,
      authConfigured: false,
      authRedirectUrl: "",
      interactions: {},
      activeCommentRecord: "",
      detailRecordId: "",
      plannerScope: "all",
      plannerSearch: "",
      plannerOwner: "",
      plannerStatus: "",
      plannerPriority: "",
      page: 1,
      pageSize: 8
    };
    const submitState = { files: [] };

    const $ = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[m]));
    const strip = (value) => String(value ?? "").replace(/\s+/g, " ").trim();
    const normalizeEmpty = (value) => value || "未填";
    const sizeLabel = (bytes) => {
      const n = Number(bytes || 0);
      if (!n) return "";
      return n > 1024 * 1024 ? `${(n / 1024 / 1024).toFixed(1)}MB` : `${Math.round(n / 1024)}KB`;
    };
    const dateLabel = (value) => {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      const pad = (n) => String(n).padStart(2, "0");
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    };

    function showSubmitMessage(message, type = "") {
      $("submitMessage").textContent = message;
      $("submitMessage").className = `form-message ${type}`.trim();
    }

    function renderSubmitFiles() {
      $("submitFileList").innerHTML = submitState.files.map((file, index) => `<div class="file-chip">
        <span>${escapeHtml(file.name)} · ${escapeHtml(sizeLabel(file.size))}</span>
        <button type="button" data-file-index="${index}" aria-label="移除附件">×</button>
      </div>`).join("");
    }

    function isAcceptedSubmitFile(file) {
      return /^(image\/|video\/)/.test(file.type)
        || /\.(gif|jpg|jpeg|png|webp|bmp|mp4|mov|webm|m4v)$/i.test(file.name || "");
    }

    function normalizeClipboardFile(file, index) {
      if (file.name) return file;
      const isVideo = /^video\//.test(file.type);
      const extension = (file.type.split("/")[1] || (isVideo ? "mp4" : "png")).replace("jpeg", "jpg");
      const prefix = isVideo ? "pasted-video" : "pasted-image";
      return new File([file], `${prefix}-${Date.now()}-${index + 1}.${extension}`, {
        type: file.type || (isVideo ? "video/mp4" : "image/png"),
        lastModified: file.lastModified || Date.now()
      });
    }

    function addSubmitFiles(files, sourceLabel = "添加") {
      const incoming = Array.from(files || []).map(normalizeClipboardFile);
      if (!incoming.length) return false;
      const accepted = incoming.filter(isAcceptedSubmitFile);
      const availableSlots = Math.max(0, 9 - submitState.files.length);
      const added = accepted.slice(0, availableSlots);
      submitState.files = [...submitState.files, ...added];
      renderSubmitFiles();

      if (incoming.length !== accepted.length) {
        showSubmitMessage("仅支持图片、GIF 和视频文件。", "error");
      } else if (accepted.length > added.length || submitState.files.length >= 9) {
        showSubmitMessage("最多保留 9 个附件。");
      } else if (added.length) {
        showSubmitMessage(`已${sourceLabel} ${added.length} 个附件。`);
      } else {
        showSubmitMessage("");
      }
      return added.length > 0;
    }

    function updateDescriptionCounter() {
      const count = $("submitDescription").value.trim().length;
      $("descriptionCounter").textContent = `至少输入 10 个字符，当前已输入 ${count} 个字符。可直接粘贴图片或视频作为附件。`;
    }

    function resetSubmitForm() {
      $("submitForm").reset();
      submitState.files = [];
      $("submitFiles").value = "";
      renderSubmitFiles();
      updateDescriptionCounter();
      showSubmitMessage("");
    }

    function openSubmitModal() {
      resetSubmitForm();
      $("submitModal").classList.add("show");
      setTimeout(() => $("submitDescription").focus(), 0);
    }

    function closeSubmitModal() {
      $("submitModal").classList.remove("show");
    }

    function platformFeedbackToRecord(item, index = 0) {
      const attachments = (item.attachments || []).map((asset) => ({
        fieldName: "附件",
        name: asset.filename,
        path: asset.path,
        token: asset.id,
        size: asset.size_bytes,
        isVideo: /\.(mp4|mov|webm|m4v)$/i.test(asset.filename || "")
      }));
      return {
        no: Number(item.sort_no || 1000000 - index),
        recordId: item.id,
        title: compactTitle(item.description),
        description: item.description,
        remark: item.description,
        proposerKey: item.proposer_key || "",
        proposerEmail: item.proposer_email || "",
        priority: "未填",
        status: "未填",
        planner: item.feedback_type || "平台反馈",
        proposer: item.proposer || "平台用户",
        likeCount: 0,
        commentCount: attachments.length,
        createdTime: dateLabel(item.created_at),
        likeUsers: "",
        attachments,
        raw: {},
        source: "platform"
      };
    }

    async function loadPlatformFeedback() {
      try {
        const response = await fetch("/api/platform-feedback");
        if (!response.ok) return [];
        const payload = await response.json();
        return (payload.feedback || []).map(platformFeedbackToRecord);
      } catch {
        return [];
      }
    }

    async function loadRecordInteractions() {
      try {
        const response = await fetch("/api/record-interactions", { cache: "no-store" });
        if (!response.ok) return {};
        const payload = await response.json();
        return payload.records || {};
      } catch {
        return {};
      }
    }

    function applyInteractions(records) {
      return records.map((record) => {
        const interaction = state.interactions[record.recordId] || {};
        const comments = interaction.comments || [];
        const dbLikeCount = Number(interaction.like_count || 0);
        return {
          ...record,
          baseLikeCount: record.baseLikeCount ?? record.likeCount,
          baseCommentCount: record.baseCommentCount ?? record.commentCount,
          likeCount: (record.baseLikeCount ?? record.likeCount) + dbLikeCount,
          commentCount: (record.baseCommentCount ?? record.commentCount) + comments.length,
          likedByMe: Boolean(interaction.liked_by_me),
          followedByMe: Boolean(interaction.followed_by_me),
          followCount: Number(interaction.follow_count || 0),
          comments
        };
      });
    }

    async function loadNotificationSettings() {
      try {
        const response = await fetch("/api/notification-settings");
        if (!response.ok) return;
        const payload = await response.json();
        state.notificationSettings = payload.settings || [];
        state.notifications = payload.notifications || [];
        state.unreadCount = payload.unread_count || 0;
      } catch {
        state.notificationSettings = [
          { key: "likes", label: "收到点赞", description: "别人赞同我提出的反馈时生成站内通知。", enabled: 1 },
          { key: "comments", label: "收到评论", description: "别人评论我提出或关注的反馈时生成站内通知。", enabled: 1 },
          { key: "status_changes", label: "状态变化", description: "策划在表格里调整处理状态时生成站内通知。", enabled: 1 },
          { key: "assignments", label: "分配给我", description: "新反馈分配到我负责时生成站内通知。", enabled: 1 }
        ];
        state.notifications = [];
        state.unreadCount = 0;
      }
    }

    async function loadCurrentUser() {
      try {
        const response = await fetch("/api/auth/me");
        const payload = await response.json();
        state.currentUser = payload.authenticated ? payload.user : null;
        state.authConfigured = Boolean(payload.configured);
        state.authRedirectUrl = payload.redirect_url || "";
      } catch {
        state.currentUser = null;
        state.authConfigured = false;
      }
      renderAuthWidget();
    }

    function renderAuthWidget() {
      const user = state.currentUser;
      if (user) {
        const avatar = user.avatar_url
          ? `<img src="${escapeHtml(user.avatar_url)}" alt="${escapeHtml(user.name)}" />`
          : escapeHtml((user.name || "飞").slice(0, 1));
        $("authWidget").innerHTML = `
          <span class="auth-card">
            <span class="auth-avatar">${avatar}</span>
            <span>${escapeHtml(user.name || "飞书用户")}</span>
          </span>
          <button class="auth-action" id="logoutButton">退出</button>
        `;
        return;
      }
      if (!state.authConfigured) {
        $("authWidget").innerHTML = `
          <button class="auth-action" id="loginButton" title="请先在 feishu_base_export/.env 配置飞书应用信息" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M21 19V5"/></svg>
            配置飞书登录
          </button>
        `;
        return;
      }
      $("authWidget").innerHTML = `
        <button class="auth-action primary" id="loginButton">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M21 19V5"/></svg>
          飞书登录
        </button>
      `;
    }

    async function logout() {
      await fetch("/api/auth/logout", { method: "POST" });
      state.currentUser = null;
      renderAuthWidget();
    }

    async function loadAllData() {
      const [recordsResponse, statusResponse] = await Promise.all([
        fetch("records_raw.json", { cache: "no-store" }),
        fetch("attachment_download_status.csv", { cache: "no-store" })
      ]);
      const payload = (await recordsResponse.json()).data;
      const statusRows = parseCsv(await statusResponse.text());
      const statusByToken = new Map(statusRows.map((row) => [row.file_token, row]));
      const [platformRecords] = await Promise.all([
        loadPlatformFeedback(),
        loadNotificationSettings(),
        loadCurrentUser()
      ]);
      state.interactions = await loadRecordInteractions();
      state.records = applyInteractions([
        ...platformRecords,
        ...payload.data.map((row, index) => toRecord(row, index, payload, statusByToken))
      ]);
      fillFilters();
      renderRightPanel();
    }

    async function refreshPlatformData() {
      const previous = $("topSubmit").innerHTML;
      $("topSubmit").disabled = true;
      $("topSubmit").innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M16 8h5V3"/></svg>刷新中';
      try {
        await loadAllData();
        renderFeed();
      } finally {
        $("topSubmit").disabled = false;
        $("topSubmit").innerHTML = previous;
      }
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      for (let i = 0; i < text.length; i += 1) {
        const ch = text[i];
        const next = text[i + 1];
        if (ch === '"' && quoted && next === '"') {
          cell += '"';
          i += 1;
        } else if (ch === '"') {
          quoted = !quoted;
        } else if (ch === "," && !quoted) {
          row.push(cell);
          cell = "";
        } else if ((ch === "\n" || ch === "\r") && !quoted) {
          if (ch === "\r" && next === "\n") i += 1;
          row.push(cell);
          if (row.some(Boolean)) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += ch;
        }
      }
      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
      }
      const [headers, ...items] = rows;
      return items.map((values) => Object.fromEntries(headers.map((h, i) => [h, values[i] || ""])));
    }

    function scalar(value) {
      if (value === null || value === undefined) return "";
      if (!Array.isArray(value)) return String(value);
      return value.map((item) => {
        if (item && typeof item === "object") return item.name || item.id || JSON.stringify(item);
        return String(item);
      }).join(", ");
    }

    function compactTitle(text) {
      const clean = strip(text || "").replace(/\s+/g, " ").trim();
      if (!clean) return "未填写描述的反馈";
      const firstSentence = clean.split(/[。！？!?；;]/)[0].trim();
      const source = firstSentence && firstSentence.length >= 8 ? firstSentence : clean;
      return source.length > 28 ? `${source.slice(0, 28)}...` : source;
    }

    function toRecord(row, index, payload, statusByToken) {
      const cells = Object.fromEntries(payload.field_id_list.map((id, i) => [id, row[i] ?? null]));
      const recordId = payload.record_id_list[index];
      const attachments = [];
      for (const fieldId of [FIELD.screenshot, FIELD.problemImage]) {
        const fieldName = fieldId === FIELD.screenshot ? "截图" : "问题描述图片";
        for (const item of cells[fieldId] || []) {
          if (!item || !item.file_token) continue;
          const status = statusByToken.get(item.file_token) || {};
          const name = item.name || status.original_name || item.file_token;
          const path = status.local_path ? status.local_path.split("feishu_base_export").pop().replace(/^[/\\]+/, "").replace(/\\/g, "/") : "";
          attachments.push({
            fieldName,
            name,
            path,
            token: item.file_token,
            size: item.size || status.size_bytes || 0,
            isVideo: /\.(mp4|mov|webm|m4v)$/i.test(name)
          });
        }
      }

      const status = normalizeEmpty(scalar(cells[FIELD.status]));
      const priority = normalizeEmpty(scalar(cells[FIELD.priority]));
      const planner = normalizeEmpty(scalar(cells[FIELD.planner]));
      const description = scalar(cells[FIELD.description]);
      const remark = scalar(cells[FIELD.remark]);
      const likeCount = Number(cells[FIELD.likeCount] || 0);

      return {
        no: index + 1,
        recordId,
        title: compactTitle(description),
        description,
        remark,
        priority,
        status,
        planner,
        proposer: scalar(cells[FIELD.proposer]) || "匿名玩家",
        likeCount,
        commentCount: Math.max(attachments.length, Math.round((likeCount + attachments.length + (remark ? 2 : 0)) / 2)),
        createdTime: scalar(cells[FIELD.createdTime]),
        likeUsers: scalar(cells[FIELD.likeUsers]),
        attachments,
        raw: cells
      };
    }

    function tagClass(value) {
      if (value === "P1") return "pill p1";
      if (value === "P2") return "pill p2";
      if (value === "处理中") return "pill doing";
      if (value === "设计中") return "pill design";
      if (value === "未填") return "pill empty";
      return "pill";
    }

    function isReplied(record) {
      return record.status !== "未填" || Boolean(record.remark);
    }

    const CURRENT_PLANNER = "张泽臻";

    function isClosed(record) {
      return /已关闭|已解决|完成|关闭/.test(record.status);
    }

    function isUnassigned(record) {
      return !record.planner || record.planner === "未填" || record.planner === "未分配";
    }

    function plannerRecords() {
      const q = state.plannerSearch.toLowerCase().trim();
      let items = [...state.records];
      if (state.plannerScope === "unassigned") items = items.filter(isUnassigned);
      if (state.plannerScope === "mine") items = items.filter((record) => record.planner === CURRENT_PLANNER && !isClosed(record));
      if (state.plannerScope === "closed") items = items.filter(isClosed);
      if (q) {
        items = items.filter((record) => [record.title, record.remark, record.proposer, record.attachments.map((a) => a.name).join(" "), record.recordId].join(" ").toLowerCase().includes(q));
      }
      if (state.plannerOwner) items = items.filter((record) => record.planner === state.plannerOwner);
      if (state.plannerStatus) items = items.filter((record) => record.status === state.plannerStatus);
      if (state.plannerPriority) items = items.filter((record) => record.priority === state.plannerPriority);
      return items.sort((a, b) => {
        const pa = { P0: 4, P1: 3, P2: 2, P3: 1 }[a.priority] || 0;
        const pb = { P0: 4, P1: 3, P2: 2, P3: 1 }[b.priority] || 0;
        return pb - pa || (b.likeCount + b.commentCount) - (a.likeCount + a.commentCount) || b.no - a.no;
      });
    }

    function filteredRecords() {
      const q = state.search.toLowerCase().trim();
      let items = state.records.filter((record) => {
        const text = [record.title, record.description, record.remark, record.planner, record.proposer, record.recordId].join(" ").toLowerCase();
        return (!q || text.includes(q))
          && (!state.planner || record.planner === state.planner)
          && (!state.priority || record.priority === state.priority);
      });

      if (state.activeTab === "hot") items = items.filter((r) => r.likeCount > 0 || r.priority === "P1");
      if (state.activeTab === "mine") items = items.filter(isMyAttentionRecord);
      if (state.navMode === "mine") {
        const me = state.currentUser?.name || "平台用户";
        items = items.filter((r) => r.source === "platform" && r.proposer === me);
      }
      if (state.navMode === "following") items = items.filter(isMyAttentionRecord);
      if (state.navMode === "mentions") items = items.filter(isReplied);

      items = [...items].sort((a, b) => {
        if (state.sort === "hot") return (b.likeCount + b.commentCount) - (a.likeCount + a.commentCount);
        if (state.sort === "assets") return b.attachments.length - a.attachments.length;
        return b.no - a.no;
      });
      return items;
    }

    function renderItem(record) {
      const hot = record.likeCount > 0 || record.priority === "P1";
      const excerpt = strip(record.remark || record.description || "暂无补充说明");
      const comments = (record.comments || []).slice(-3);
      const visibleAttachments = (record.attachments || []).slice(0, 6);
      const attachmentThumbs = visibleAttachments.length ? `<div class="attachment-thumbs">
        ${visibleAttachments.map((asset) => {
          if (!asset.path) return `<span class="attachment-thumb" title="${escapeHtml(asset.name || "附件")}">附件</span>`;
          const media = asset.isVideo
            ? `<video src="${escapeHtml(asset.path)}" muted preload="metadata"></video>`
            : `<img src="${escapeHtml(asset.path)}" alt="${escapeHtml(asset.name || "附件")}" loading="lazy" />`;
          return `<button type="button" class="attachment-thumb" data-preview-src="${escapeHtml(asset.path)}" data-preview-name="${escapeHtml(asset.name || "附件")}" data-preview-kind="${asset.isVideo ? "video" : "image"}" title="${escapeHtml(asset.name || "附件")}">${media}</button>`;
        }).join("")}
        ${record.attachments.length > visibleAttachments.length ? `<span class="attachment-thumb more">+${record.attachments.length - visibleAttachments.length}</span>` : ""}
      </div>` : "";
      const commentPanel = state.activeCommentRecord === record.recordId ? `<div class="comment-panel">
        ${comments.length ? `<div class="comment-list">${comments.map((comment) => `<div class="inline-comment">
          <b>${escapeHtml(comment.author_name || "平台用户")}</b>
          <span>${escapeHtml(dateLabel(comment.created_at).slice(5, 16))}</span>
          <div>${escapeHtml(comment.body)}</div>
        </div>`).join("")}</div>` : ""}
        <form class="comment-form" data-comment-form="${escapeHtml(record.recordId)}">
          <input name="comment" placeholder="回复这个反馈，补充复现步骤或处理建议" autocomplete="off" />
          <button type="submit">回复</button>
        </form>
      </div>` : "";
      return `<article class="item" data-record-id="${escapeHtml(record.recordId)}">
        <div>
          <div class="labels">
            ${hot ? '<span class="pill hot">热门</span>' : ""}
            <span class="${tagClass(record.priority)}">${escapeHtml(record.priority)}</span>
            <span class="${tagClass(record.status)}">${escapeHtml(record.status)}</span>
          </div>
          <h2><button class="item-title" data-open-record="${escapeHtml(record.recordId)}">${escapeHtml(record.title)}</button></h2>
          <div class="excerpt">${escapeHtml(excerpt)}</div>
          <div class="byline">
            <span>玩家-${escapeHtml(record.proposer)}</span>
            <span>${escapeHtml(record.createdTime || "未知时间")}</span>
          </div>
          ${attachmentThumbs}
        </div>
        <div class="metrics">
          <button class="metric like ${record.likedByMe ? "active" : ""}" data-like-record="${escapeHtml(record.recordId)}" aria-label="点赞">
            <span class="plus-one">+1</span>
            ${record.likeCount}
          </button>
          <button class="metric follow ${record.followedByMe ? "active" : ""}" data-follow-record="${escapeHtml(record.recordId)}" aria-label="关注">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M7 3h10a1 1 0 0 1 1 1v17l-6-3-6 3V4a1 1 0 0 1 1-1Z"/><path d="M12 8v6"/><path d="M9 11h6"/></svg>
            ${record.followedByMe ? "已关注" : "关注"}
          </button>
          <button class="metric" data-comment-record="${escapeHtml(record.recordId)}" aria-label="评论">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>
            ${record.commentCount}
          </button>
        </div>
        ${commentPanel}
      </article>`;
    }

    function renderPager(total) {
      const pageCount = Math.max(1, Math.ceil(total / state.pageSize));
      state.page = Math.min(state.page, pageCount);
      const pages = [];
      for (let i = 1; i <= pageCount; i += 1) {
        if (i <= 5 || i === pageCount || Math.abs(i - state.page) <= 1) pages.push(i);
      }
      const uniquePages = [...new Set(pages)];
      $("pager").innerHTML = uniquePages.map((p, i) => {
        const gap = i > 0 && p - uniquePages[i - 1] > 1 ? "<span>...</span>" : "";
        return `${gap}<button class="${p === state.page ? "active" : ""}" data-page="${p}">${p}</button>`;
      }).join("");

    function renderFeed() {
      if (state.navMode === "settings") {
        renderNotificationSettings();
        return;
      }
      if (state.navMode === "profile") {
        renderProfileCenter();
        return;
      }
      if (state.navMode === "platform-settings") {
        renderPlatformSettings();
        return;
      }
      if (state.navMode === "planner-table") {
        renderPlannerTable();
        return;
      }
      const items = filteredRecords();
      const start = (state.page - 1) * state.pageSize;
      const pageItems = items.slice(start, start + state.pageSize);
      $("feed").innerHTML = pageItems.length ? pageItems.map(renderItem).join("") : '<div class="empty-state">没有符合条件的反馈</div>';
      renderPager(items.length);

    function countBy(records, key) {
      const map = new Map();
      for (const record of records) map.set(record[key], (map.get(record[key]) || 0) + 1);
      return [...map.entries()].sort((a, b) => b[1] - a[1]);
    }

    function renderRightPanel() {
      const topics = countBy(state.records, "proposer").slice(0, 5);
      $("topics").innerHTML = topics.map(([name, count], i) => `<div class="topic">
        <div class="topic-row"><span class="rank top${i + 1}">${i + 1}</span><b>${escapeHtml(name)}</b><span class="topic-count">${count}个反馈</span></div>
      </div>`).join("");

      const replies = state.records.filter(isReplied).slice().sort((a, b) => b.no - a.no).slice(0, 3);
      $("replies").innerHTML = replies.map((record) => `<div class="reply">
        <b>${escapeHtml(record.title)}</b>
        <span><span class="${tagClass(record.status)}">${escapeHtml(record.status)}</span>　${escapeHtml(record.planner)} 已更新进展</span>
      </div>`).join("");
    }

    function fillFilters() {
      const planners = countBy(state.records, "planner").map(([name]) => name).sort((a, b) => a.localeCompare(b, "zh-CN"));
      const priorities = countBy(state.records, "priority").map(([name]) => name).sort();
      $("plannerFilter").innerHTML = '<option value="">全部模块</option>' + planners.map((v) => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
      $("priorityFilter").innerHTML = '<option value="">全部类型</option>' + priorities.map((v) => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
    }

    function canDeleteRecord(record) {
      const user = state.currentUser;
      if (!record || record.source !== "platform" || !user) return false;
      if (user.is_admin) return true;
      const userKeys = [user.open_id, user.union_id, user.email].filter(Boolean);
      return userKeys.includes(record.proposerKey)
        || userKeys.includes(record.proposerEmail)
        || Boolean(record.proposer && record.proposer === user.name);
    }

    function isMyAttentionRecord(record) {
      const user = state.currentUser;
      if (!record || !user) return false;
      const name = user.name || "";
      const userKeys = [user.open_id, user.union_id, user.email].filter(Boolean);
      const proposedByMe = userKeys.includes(record.proposerKey)
        || userKeys.includes(record.proposerEmail)
        || Boolean(name && record.proposer === name);
      const likedByMe = Boolean(record.likedByMe)
        || Boolean(name && String(record.likeUsers || "").includes(name));
      const followedByMe = Boolean(record.followedByMe);
      const commentedByMe = (record.comments || []).some((comment) => {
        return userKeys.includes(comment.author_key) || Boolean(name && comment.author_name === name);
      });
      const mentionedMe = Boolean(name && [
        record.title,
        record.description,
        record.remark,
        ...(record.comments || []).map((comment) => comment.body)
      ].join(" ").includes(name));
      return proposedByMe || likedByMe || followedByMe || commentedByMe || mentionedMe;
    }

    function openMediaPreview(trigger) {
      const src = trigger.dataset.previewSrc;
      if (!src) return;
      const name = trigger.dataset.previewName || "附件预览";
      const kind = trigger.dataset.previewKind || "image";
      $("mediaTitle").textContent = name;
      $("mediaBody").innerHTML = kind === "video"
        ? `<video src="${escapeHtml(src)}" controls autoplay preload="metadata"></video>`
        : `<img src="${escapeHtml(src)}" alt="${escapeHtml(name)}" />`;
      $("mediaModal").classList.add("show");
    }

    function closeMediaPreview() {
      $("mediaModal").classList.remove("show");
      $("mediaBody").innerHTML = "";
    }

    function openDetail(recordId) {
      const record = state.records.find((item) => item.recordId === recordId);
      if (!record) return;
      state.detailRecordId = recordId;
      $("modalLabels").innerHTML = `
        <span class="${tagClass(record.priority)}">${escapeHtml(record.priority)}</span>
        <span class="${tagClass(record.status)}">${escapeHtml(record.status)}</span>
        <span class="pill">${escapeHtml(record.planner)}</span>
      `;
      $("modalTitle").textContent = record.title;
      $("modalDetails").innerHTML = [
        ["记录 ID", record.recordId],
        ["提出人", record.proposer],
        ["创建时间", record.createdTime || "未知"],
        ["点赞/讨论", `${record.likeCount} / ${record.commentCount}`]
      ].map(([label, value]) => `<div class="detail"><label>${label}</label><div>${escapeHtml(value)}</div></div>`).join("");
      $("modalRemark").textContent = record.remark || record.description || "暂无补充说明";
      $("modalAssets").innerHTML = record.attachments.length ? record.attachments.map((asset) => {
        const media = asset.isVideo
          ? `<video src="${escapeHtml(asset.path)}" muted preload="metadata"></video>`
          : `<img src="${escapeHtml(asset.path)}" alt="${escapeHtml(asset.name)}" loading="lazy" />`;
        return `<button type="button" class="asset" data-preview-src="${escapeHtml(asset.path)}" data-preview-name="${escapeHtml(asset.name || "附件")}" data-preview-kind="${asset.isVideo ? "video" : "image"}" title="${escapeHtml(asset.name)}">
          <div class="asset-media">${media}</div>
        </button>`;
      }).join("") : '<div class="empty-state">这条反馈没有附件</div>';
      $("modalActions").style.display = canDeleteRecord(record) ? "flex" : "none";
      $("detailModal").classList.add("show");
    }

    async function deleteCurrentRecord() {
      const record = state.records.find((item) => item.recordId === state.detailRecordId);
      if (!record || !canDeleteRecord(record)) return;
      if (!window.confirm("确认删除这条记录吗？删除后会同时移除它在平台数据库里的附件、点赞和评论。")) return;

      const button = $("deleteRecordButton");
      button.disabled = true;
      button.textContent = "删除中...";
      try {
        const response = await fetch(`/api/platform-feedback/${encodeURIComponent(record.recordId)}`, { method: "DELETE" });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || "删除失败");
        state.records = state.records.filter((item) => item.recordId !== record.recordId);
        delete state.interactions[record.recordId];
        state.detailRecordId = "";
        $("detailModal").classList.remove("show");
        fillFilters();
        renderRightPanel();
        renderFeed();
      } catch (error) {
        alert(error.message || "删除失败，请稍后再试。");
      } finally {
        button.disabled = false;
        button.textContent = "删除记录";
      }
    }

    async function submitFeedback(event) {
      event.preventDefault();
      const description = $("submitDescription").value.trim();
      if (description.length < 10) {
        showSubmitMessage("请至少输入 10 个字符，让处理人能看懂问题。", "error");
        return;
      }
      if (submitState.files.length > 9) {
        showSubmitMessage("附件最多上传 9 个。", "error");
        return;
      }

      const button = $("confirmSubmit");
      button.disabled = true;
      button.textContent = "提交中...";
      showSubmitMessage("正在保存到平台数据库...");

      try {
        const formData = new FormData();
        formData.append("feedback_type", new FormData($("submitForm")).get("feedbackType"));
        formData.append("description", description);
        formData.append("proposer", state.currentUser?.name || "平台用户");
        submitState.files.forEach((file) => formData.append("attachments", file, file.name));

        const response = await fetch("/api/platform-feedback", {
          method: "POST",
          body: formData
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || "提交失败");

        const record = platformFeedbackToRecord(payload.feedback);
        state.records.unshift(record);
        state.activeTab = "mine";
        state.sort = "new";
        state.page = 1;
        $("sortSelect").value = "new";
        document.querySelectorAll(".tab").forEach((item) => item.classList.toggle("active", item.dataset.filter === "mine"));
        fillFilters();
        renderRightPanel();
        renderFeed();
        showSubmitMessage("已保存到平台数据库，并展示在反馈广场。", "success");
        setTimeout(closeSubmitModal, 650);
      } catch (error) {
        showSubmitMessage(error.message || "提交失败，请稍后再试。", "error");
      } finally {
        button.disabled = false;
        button.textContent = "提交反馈";
      }
    }

    function updateRecordInteraction(recordId, interaction) {
      state.interactions[recordId] = interaction || { like_count: 0, liked_by_me: false, follow_count: 0, followed_by_me: false, comments: [] };
      state.records = applyInteractions(state.records);
      renderRightPanel();
      renderFeed();
    }

    async function toggleLike(recordId) {
      const record = state.records.find((item) => item.recordId === recordId);
      if (!record) return;
      record.likedByMe = !record.likedByMe;
      record.likeCount += record.likedByMe ? 1 : -1;
      renderFeed();
      try {
        const response = await fetch("/api/record-likes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ record_id: recordId })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "点赞失败");
        updateRecordInteraction(recordId, payload.interaction);
      } catch (error) {
        await loadAllData();
        renderFeed();
        alert(error.message || "点赞失败，请稍后再试。");
      }
    }

    async function toggleFollow(recordId) {
      const record = state.records.find((item) => item.recordId === recordId);
      if (!record) return;
      record.followedByMe = !record.followedByMe;
      record.followCount = Math.max(0, Number(record.followCount || 0) + (record.followedByMe ? 1 : -1));
      renderFeed();
      try {
        const response = await fetch("/api/record-follows", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ record_id: recordId })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "关注失败");
        updateRecordInteraction(recordId, payload.interaction);
      } catch (error) {
        await loadAllData();
        renderFeed();
        alert(error.message || "关注失败，请稍后再试。");
      }
    }

    async function submitInlineComment(form) {
      const recordId = form.dataset.commentForm;
      const input = form.elements.comment;
      const body = input.value.trim();
      if (!body) return;
      const button = form.querySelector("button");
      button.disabled = true;
      button.textContent = "发送中";
      try {
        const response = await fetch("/api/record-comments", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ record_id: recordId, body })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "评论失败");
        input.value = "";
        state.activeCommentRecord = recordId;
        updateRecordInteraction(recordId, payload.interaction);
      } catch (error) {
        alert(error.message || "评论失败，请稍后再试。");
      } finally {
        button.disabled = false;
        button.textContent = "回复";
      }
    }
