<!doctype html>
<html lang="zh-CN">
<head>

  <title>Feishu Base Viewer</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9dee8;
      --accent: #246bfe;
      --accent-soft: #e8f0ff;
      --danger: #c2410c;
      --ok: #047857;
      --shadow: 0 10px 30px rgba(22, 32, 51, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(246, 247, 249, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .wrap { max-width: 1440px; margin: 0 auto; padding: 18px 24px; }
    .topline { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    h1 { margin: 0; font-size: 22px; line-height: 1.2; letter-spacing: 0; }
    .meta { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap: 10px; margin-top: 14px; }
    .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
    .stat b { display: block; font-size: 22px; }

    .filters { display: grid; grid-template-columns: 1fr 150px 160px 180px; gap: 10px; margin-top: 14px; }

      border-radius: 7px;
      background: #fff;
      color: var(--text);
      padding: 0 11px;
      font: inherit;
    }
    button { cursor: pointer; background: var(--accent); color: #fff; border-color: var(--accent); }
    main.wrap { display: grid; grid-template-columns: 1fr 320px; gap: 16px; align-items: start; }
    .list { display: grid; gap: 12px; }
    .record { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); overflow: hidden; }
    .record-head { display: flex; justify-content: space-between; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .title { font-weight: 700; line-height: 1.5; white-space: pre-wrap; }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; min-width: 210px; }
    .badge { display: inline-flex; align-items: center; height: 24px; border-radius: 999px; padding: 0 9px; font-size: 12px; background: #eef1f6; color: #344054; white-space: nowrap; }
    .p1 { background: #fff1e7; color: #9a3412; }
    .p2 { background: var(--accent-soft); color: #1d4ed8; }
    .doing { background: #ecfdf5; color: var(--ok); }
    .design { background: #f3e8ff; color: #7e22ce; }
    .record-body { padding: 14px 16px 16px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; }
    .field { border: 1px solid #edf0f5; border-radius: 7px; padding: 9px; min-height: 56px; }
    .label { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .value { font-size: 14px; line-height: 1.45; overflow-wrap: anywhere; white-space: pre-wrap; }
    .remark { background: #f8fafc; border: 1px solid #edf0f5; border-radius: 7px; padding: 10px; margin-bottom: 12px; }
    .attachments { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .asset { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fbfcfe; }
    .asset-media { height: 132px; background: #eef1f6; display: flex; align-items: center; justify-content: center; }
    .asset img, .asset video { width: 100%; height: 100%; object-fit: contain; display: block; }
    .asset-info { padding: 8px; font-size: 12px; color: var(--muted); overflow-wrap: anywhere; }
    .asset-info a { color: var(--accent); text-decoration: none; }
    aside { position: sticky; top: 150px; display: grid; gap: 12px; }
    .side { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
    .side h2 { margin: 0 0 10px; font-size: 15px; }
    .dist { display: grid; gap: 8px; }
    .bar { display: grid; grid-template-columns: 78px 1fr 34px; gap: 8px; align-items: center; font-size: 13px; }
    .track { height: 8px; border-radius: 999px; background: #eef1f6; overflow: hidden; }
    .fill { height: 100%; background: var(--accent); }
    .empty { padding: 34px; text-align: center; color: var(--muted); background: var(--panel); border: 1px dashed var(--line); border-radius: 8px; }
    @media (max-width: 980px) {
      .filters { grid-template-columns: 1fr 1fr; }
      main.wrap { grid-template-columns: 1fr; }
      aside { position: static; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .wrap { padding: 14px; }
      .topline { align-items: flex-start; flex-direction: column; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .filters { grid-template-columns: 1fr; }
      .record-head { flex-direction: column; }
      .badges { justify-content: flex-start; min-width: 0; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>

    ['priorities', 'statuses', 'planners'].forEach((key) => { if (dataset.summary[key] && dataset.summary[key]['??'] !== undefined) { dataset.summary[key].Empty = dataset.summary[key]['??']; delete dataset.summary[key]['??']; } });
    const state = { search: '', priority: '', status: '', planner: '' };

    const el = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    const fmtSize = (bytes) => {
      const n = Number(bytes || 0);
      if (!n) return '';
      if (n > 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + ' MB';
      return Math.round(n / 1024) + ' KB';
    };
    const unique = (key) => [...new Set(records.map((r) => r[key] || 'Empty'))].sort((a, b) => a.localeCompare(b, 'zh-CN'));

    function fillSelect(id, values) {
      const select = el(id);
      values.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function badgeClass(value) {
      if (value === 'P1') return 'badge p1';
      if (value === 'P2') return 'badge p2';
      if (value === '???') return 'badge doing';
      if (value === '???') return 'badge design';
      return 'badge';
    }

    function assetHtml(asset) {
      const path = asset.path;
      const lower = (asset.name || '').toLowerCase();
      const media = lower.endsWith('.mp4') || lower.endsWith('.mov') || lower.endsWith('.webm')
        ? `<video src="${escapeHtml(path)}" controls preload="metadata"></video>`
        : `<img src="${escapeHtml(path)}" alt="${escapeHtml(asset.name)}" loading="lazy" />`;
      return `<div class="asset">
        <div class="asset-media">${path ? media : '<span>Missing</span>'}</div>
        <div class="asset-info">
          <div>${escapeHtml(asset.field)} - ${escapeHtml(fmtSize(asset.size))}</div>
          <a href="${escapeHtml(path)}" target="_blank">${escapeHtml(asset.name)}</a>
        </div>
      </div>`;
    }

    function recordHtml(record) {
      const description = record.description || '(empty description)';
      const attachments = record.attachments.length
        ? `<div class="attachments">${record.attachments.map(assetHtml).join('')}</div>`
        : '';
      return `<article class="record">
        <div class="record-head">
          <div class="title">#${record.no} ${escapeHtml(description)}</div>
          <div class="badges">
            <span class="${badgeClass(record.priority)}">${escapeHtml(record.priority || 'No priority')}</span>
            <span class="${badgeClass(record.status)}">${escapeHtml(record.status || 'No status')}</span>
            <span class="badge">${escapeHtml(record.planner || 'No planner')}</span>
          </div>
        </div>
        <div class="record-body">
          <div class="grid">
            <div class="field"><div class="label">Record ID</div><div class="value">${escapeHtml(record.recordId)}</div></div>
            <div class="field"><div class="label">Proposer</div><div class="value">${escapeHtml(record.proposer || '-')}</div></div>
            <div class="field"><div class="label">Likes</div><div class="value">${escapeHtml(record.likeCount)}</div></div>
            <div class="field"><div class="label">Created</div><div class="value">${escapeHtml(record.createdTime || '-')}</div></div>
          </div>
          ${record.remark ? `<div class="remark"><div class="label">Remark</div><div class="value">${escapeHtml(record.remark)}</div></div>` : ''}
          ${attachments}
        </div>
      </article>`;
    }

    function filteredRecords() {
      const q = state.search.trim().toLowerCase();
      return records.filter((record) => {
        const text = [record.description, record.remark, record.planner, record.proposer, record.recordId].join(' ').toLowerCase();
        return (!q || text.includes(q))
          && (!state.priority || (record.priority || 'Empty') === state.priority)
          && (!state.status || (record.status || 'Empty') === state.status)
          && (!state.planner || (record.planner || 'Empty') === state.planner);
      });
    }

    function renderDist(id, data) {
      const entries = Object.entries(data).sort((a, b) => b[1] - a[1]);
      const max = Math.max(1, ...entries.map(([, count]) => count));
      el(id).innerHTML = entries.map(([name, count]) => `<div class="bar"><span>${escapeHtml(name)}</span><div class="track"><div class="fill" style="width:${(count / max) * 100}%"></div></div><b>${count}</b></div>`).join('');
    }

    function render() {
      const visible = filteredRecords();
      el('totalCount').textContent = dataset.summary.total;
      el('visibleCount').textContent = visible.length;
      el('assetCount').textContent = dataset.summary.attachments;
      el('downloadedCount').textContent = dataset.summary.downloaded;
      el('records').innerHTML = visible.length ? visible.map(recordHtml).join('') : '<div class="empty">No records match the filters</div>';
      renderDist('priorityDist', dataset.summary.priorities);
      renderDist('statusDist', dataset.summary.statuses);
      renderDist('plannerDist', dataset.summary.planners);
    }

    fillSelect('priorityFilter', unique('priority'));
    fillSelect('statusFilter', unique('status'));
    fillSelect('plannerFilter', unique('planner'));
    el('searchInput').addEventListener('input', (event) => { state.search = event.target.value; render(); });
    el('priorityFilter').addEventListener('change', (event) => { state.priority = event.target.value; render(); });
    el('statusFilter').addEventListener('change', (event) => { state.status = event.target.value; render(); });
    el('plannerFilter').addEventListener('change', (event) => { state.planner = event.target.value; render(); });
    el('resetBtn').addEventListener('click', () => {
      state.search = state.priority = state.status = state.planner = '';
      el('searchInput').value = '';
      el('priorityFilter').value = '';
      el('statusFilter').value = '';
      el('plannerFilter').value = '';
      render();
    });
    render();
  </script>
</body>
</html>
