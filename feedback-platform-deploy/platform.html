      try {
        const response = await fetch("/api/sync/writeback-retry", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ feedback_ids: feedbackIds, failed_only: true })
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || "重试失败");
        state.syncStatus = payload.sync || state.syncStatus;
        state.writebackLogs = payload.logs || state.writebackLogs;
        await loadAllData();
        state.showWritebackLogs = true;
        renderFeed();
        const result = payload.result || {};
        alert(`重试完成：成功 ${result.synced || 0} 条，失败 ${result.failed || 0} 条。`);
      } catch (error) {
        await loadSyncStatus();
        await loadWritebackLogs();
        state.showWritebackLogs = true;
        renderFeed();
        alert(error.message || "重试失败，请稍后再试。");
      } finally {
        const nextButton = feedbackIds.length ? null : $("retryFailedWritebacksButton");
        if (nextButton) {
          nextButton.disabled = false;
          nextButton.textContent = previous || "一键重试失败";
        }
      }
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      for (let i = 0; i < text.length; i += 1) {
        const ch = text[i];
        const next = text[i + 1];
        if (ch === '"' && quoted && next === '"') {
          cell += '"';
          i += 1;
        } else if (ch === '"') {
          quoted = !quoted;
        } else if (ch === "," && !quoted) {
          row.push(cell);
          cell = "";
        } else if ((ch === "\n" || ch === "\r") && !quoted) {
          if (ch === "\r" && next === "\n") i += 1;
          row.push(cell);
          if (row.some(Boolean)) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += ch;
        }
      }
      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
      }
      const [headers, ...items] = rows;
      return items.map((values) => Object.fromEntries(headers.map((h, i) => [h, values[i] || ""])));
    }

    function scalar(value) {
      if (value === null || value === undefined) return "";
      if (!Array.isArray(value)) return String(value);
      return value.map((item) => {
        if (item && typeof item === "object") return item.name || item.id || JSON.stringify(item);
        return String(item);
      }).join(", ");
    }

    function uniqueValues(values) {
      const seen = new Set();
      return values.map((item) => strip(item)).filter((item) => {
        if (!item || seen.has(item)) return false;
        seen.add(item);
        return true;
      });
    }

    function extractBasePerson(value) {
      const people = { names: [], keys: [], emails: [] };
      const visit = (item) => {
        if (item === null || item === undefined) return;
        if (Array.isArray(item)) {
          item.forEach(visit);
          return;
        }
        if (typeof item === "object") {
          const name = item.name || item.en_name || item.display_name || item.text || item.email || item.open_id || item.user_id || item.union_id || item.id;
          const key = item.open_id || item.user_id || item.union_id || item.id;
          if (name) people.names.push(name);
          if (key) people.keys.push(key);
          if (item.email) people.emails.push(item.email);
          return;
        }
        String(item).split(/[,，、\n]/).forEach((part) => {
          if (part.trim()) people.names.push(part);
        });
      };
      visit(value);
      return {
        names: uniqueValues(people.names),
        keys: uniqueValues(people.keys),
        emails: uniqueValues(people.emails)
      };
    }

    function compactTitle(text, maxLength = 96) {
      const clean = strip(text || "").replace(/\s+/g, " ").trim();
      if (!clean) return "未填写描述的反馈";
      const firstSentence = clean.split(/[。！？!?；;]/)[0].trim();
      const source = firstSentence && firstSentence.length >= 8 ? firstSentence : clean;
      return source.length > maxLength ? `${source.slice(0, maxLength).trim()}...` : source;
    }

    function toRecord(row, index, payload, statusByToken) {
      const cells = Object.fromEntries(payload.field_id_list.map((id, i) => [id, row[i] ?? null]));
      const recordId = payload.record_id_list[index];
      const attachments = [];
      for (const [fieldId, fieldName] of [[FIELD.screenshot, "截图"]]) {
        for (const item of cells[fieldId] || []) {
          if (!item || !item.file_token) continue;
          const status = statusByToken.get(item.file_token) || {};
          const name = item.name || status.original_name || item.file_token;
          const path = attachmentPathFromStatus(status.local_path);
          attachments.push({
            fieldName,
            name,
            path,
            token: item.file_token,
            downloadStatus: status.download_status || (path ? "downloaded" : "missing"),
            downloadError: status.download_error || "",
            size: item.size || status.size_bytes || 0,
            isVideo: /\.(mp4|mov|webm|m4v)$/i.test(name)
          });
        }
      }

      const status = normalizeEmpty(scalar(cells[FIELD.status]));
      const priority = normalizeEmpty(scalar(cells[FIELD.priority]));
      const planner = normalizeEmpty(scalar(cells[FIELD.planner]));
      const description = scalar(cells[FIELD.description]);
      const remark = scalar(cells[FIELD.remark]);
      const likeCount = Number(scalar(cells[FIELD.likeCount]) || 0);
      const proposerPerson = extractBasePerson(cells[FIELD.proposer]);

      const record = {
        no: index + 1,
        recordId,
        title: compactTitle(description, 160),
        description,
        remark,
        module: normalizePlazaModule(planner),
        priority,
        status,
        planner,
        proposer: proposerPerson.names.join("、") || scalar(cells[FIELD.proposer]) || "匿名玩家",
        proposerKey: proposerPerson.keys[0] || "",
        proposerKeys: proposerPerson.keys,
        proposerEmail: proposerPerson.emails[0] || "",
        proposerEmails: proposerPerson.emails,
        likeCount: Number.isFinite(likeCount) ? likeCount : 0,
        commentCount: 0,
        createdTime: scalar(cells[FIELD.createdTime]),
        updatedTime: scalar(cells[FIELD.createdTime]),
        likeUsers: scalar(cells[FIELD.likeUsers]),
        attachments,
        raw: cells
      };
      record.autoTags = classifyFeedback(record);
      return record;
    }

    function tagClass(value) {
      if (value === "P1") return "pill p1";
      if (value === "P2") return "pill p2";
      if (value === "处理中") return "pill doing";
      if (value === "策划已采纳") return "pill accepted";
      if (value === "后续版本处理") return "pill future";
      if (value === "已处理") return "pill done";
      if (value === "设计中") return "pill design";
      if (value === "未填") return "pill empty";
      return "pill";
    }

    function renderTag(value) {
      const text = strip(value);
      if (!text || text === "未填") return "";
      return `<span class="${tagClass(text)}">${escapeHtml(text)}</span>`;
    }

    function isReplied(record) {
      return record.status !== "未填" || Boolean(record.remark);
    }

    function isClosed(record) {
      return /已关闭|已解决|完成|关闭/.test(record.status);
    }

    function isHiddenFromHot(record) {
      return ["已处理", "处理中"].includes(strip(record.status));
    }

    function isHotTabRecord(record) {
      const status = strip(record.status) || "未填";
      return HOT_TAB_STATUSES.includes(status);
    }

    function isCurrentUserPlanner(record) {
      const name = state.currentUser?.name || "";
      return Boolean(name && record.planner === name);
    }

    function isUnassignedField(value) {
      const text = strip(value);
      return !text || text === "未填" || text === "未分配";
    }

    function isUnassigned(record) {
      return isUnassignedField(record.planner);
    }

    function isPriorityEmpty(record) {
      return isUnassignedField(record.priority);
    }

    function isUnassignedPlannerViewRecord(record) {
      return isUnassigned(record);
    }

    function plannerRecords() {
      const q = state.plannerSearch.toLowerCase().trim();
      let items = [...state.records];
      const selectedStatuses = selectedPlannerStatuses();
      if (state.plannerScope === "unassigned") items = items.filter(isUnassignedPlannerViewRecord);
      if (state.plannerScope === "mine") items = items.filter((record) => isCurrentUserPlanner(record) && !isClosed(record));
      if (state.plannerScope === "closed") items = items.filter(isClosed);
      if (q) {
        items = items.filter((record) => {
          const tagText = (record.autoTags || []).map(autoTagLabel).join(" ");
          return [record.title, record.remark, record.proposer, record.attachments.map((a) => a.name).join(" "), record.recordId, tagText].join(" ").toLowerCase().includes(q);
        });
      }
      if (state.plannerOwner) items = items.filter((record) => record.planner === state.plannerOwner);
      if (selectedStatuses.length) items = items.filter((record) => selectedStatuses.includes(record.status || "未填"));
      if (state.plannerPriority) items = items.filter((record) => record.priority === state.plannerPriority);
      return items.sort((a, b) => {
        const pa = { P0: 4, P1: 3, P2: 2, P3: 1 }[a.priority] || 0;
        const pb = { P0: 4, P1: 3, P2: 2, P3: 1 }[b.priority] || 0;
        return pb - pa || (b.likeCount + b.commentCount) - (a.likeCount + a.commentCount) || b.no - a.no;
      });
    }

    function filteredRecords() {
      let items = baseFilteredRecords();

      if (state.activeTab === "hot") items = items.filter(isHotTabRecord);
      if (state.activeTab === "mine") items = items.filter(matchesMyAttentionScope);
      if (state.navMode === "mine") {
        const me = state.currentUser?.name || "平台用户";
        items = items.filter((r) => r.source === "platform" && r.proposer === me);
      }
      if (state.navMode === "following") items = items.filter(isMyAttentionRecord);
      if (state.navMode === "mentions") items = items.filter(isReplied);

      items = [...items].sort((a, b) => {
        if (state.sort === "updated") return timestampValue(b.updatedTime || b.createdTime) - timestampValue(a.updatedTime || a.createdTime) || b.no - a.no;
        if (state.sort === "hot") return b.likeCount - a.likeCount || b.commentCount - a.commentCount || timestampValue(b.updatedTime || b.createdTime) - timestampValue(a.updatedTime || a.createdTime) || b.no - a.no;
        if (state.sort === "assets") return b.attachments.length - a.attachments.length;
        return b.no - a.no;
      });
      return items;
    }

    function renderItem(record) {
      const hot = record.likeCount > 0 || record.priority === "P1";
      const fullDescription = String(record.description || record.remark || record.title || "暂无描述")
        .replace(/\s+/g, " ")
        .trim();
      const descriptionParts = Array.from(fullDescription);
      const titleText = descriptionParts.slice(0, 60).join("");
      const subtitleText = descriptionParts.slice(60).join("").trim();
      const comments = record.comments || [];
      const isCommentOpen = state.activeCommentRecord === record.recordId;
      const visibleComments = isCommentOpen ? comments.slice(-3) : comments.slice(-1);
      const renderInlineComment = (comment) => `<div class="inline-comment">
        ${renderPersonIdentity(comment.author_name || "平台用户", "plain compact")}
        <span class="inline-comment-time">${escapeHtml(dateLabel(comment.created_at).slice(5, 16))}</span>
        ${canDeleteComment(comment) ? `<button class="comment-delete" type="button" data-delete-comment="${escapeHtml(comment.id)}" data-delete-comment-record="${escapeHtml(record.recordId)}">删除</button>` : ""}
        <div>${escapeHtml(comment.body)}</div>
      </div>`;
      const visibleAttachments = (record.attachments || []).slice(0, 2);
      const attachmentThumbs = visibleAttachments.length ? `<div class="attachment-thumbs">
        ${visibleAttachments.map((asset) => {
          if (!asset.path) return `<span class="attachment-thumb" title="${escapeHtml(`${asset.fieldName || "附件"}：${asset.name || "下载失败"}`)}">${asset.downloadStatus === "failed" ? "下载失败" : "附件"}</span>`;
          const media = asset.isVideo
            ? `<video src="${escapeHtml(asset.path)}" muted preload="metadata"></video>`
            : `<img src="${escapeHtml(asset.path)}" alt="${escapeHtml(asset.name || "附件")}" loading="lazy" />`;
          return `<button type="button" class="attachment-thumb" data-preview-src="${escapeHtml(asset.path)}" data-preview-name="${escapeHtml(asset.name || "附件")}" data-preview-kind="${asset.isVideo ? "video" : "image"}" title="${escapeHtml(asset.name || "附件")}">${media}</button>`;
        }).join("")}
        ${record.attachments.length > visibleAttachments.length ? `<span class="attachment-thumb more">+${record.attachments.length - visibleAttachments.length}</span>` : ""}
      </div>` : "";
      const commentPanel = (visibleComments.length || isCommentOpen) ? `<div class="comment-panel">
        ${visibleComments.length ? `<div class="comment-list">${visibleComments.map(renderInlineComment).join("")}</div>` : ""}
        ${isCommentOpen ? `<form class="comment-form" data-comment-form="${escapeHtml(record.recordId)}">
          <input name="comment" placeholder="回复这个反馈，补充复现步骤或处理建议" autocomplete="off" />
          <button type="submit">回复</button>
        </form>` : ""}
      </div>` : "";
      const itemClass = attachmentThumbs ? "item has-attachments" : "item";
      return `<article class="${itemClass}" data-record-id="${escapeHtml(record.recordId)}">
        <div class="item-main">
          <div class="item-text">
            <div class="labels">
              ${hot ? '<span class="pill hot">热门</span>' : ""}
              ${renderTag(record.priority)}
              ${renderTag(record.status)}
              ${renderAutoTags(record, { limit: 4 })}
            </div>
            <h2><button class="item-title" data-open-record="${escapeHtml(record.recordId)}">${escapeHtml(titleText)}</button></h2>
            ${subtitleText ? `<div class="excerpt">${escapeHtml(subtitleText)}</div>` : ""}
            <div class="byline">
              ${renderPersonIdentity(record.proposer, "plain")}
              <span>${escapeHtml(record.createdTime || "未知时间")}</span>
            </div>
          </div>
          ${attachmentThumbs}
        </div>
        <div class="metrics">
          <button class="metric like ${record.likedByMe ? "active" : ""}" data-like-record="${escapeHtml(record.recordId)}" aria-label="好问题">
            <span class="plus-one">+1</span>
          </button>
          <span class="like-count" aria-label="点赞数">${escapeHtml(Number(record.likeCount || 0))}${Number(record.likeCount || 0) > 3 ? '<span class="like-flame" aria-hidden="true">🔥</span>' : ""}</span>
          <button class="metric follow ${record.followedByMe ? "active" : ""}" data-follow-record="${escapeHtml(record.recordId)}" aria-label="${record.followedByMe ? "已关注" : "关注"}" title="${record.followedByMe ? "已关注" : "关注"}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M7 3h10a1 1 0 0 1 1 1v17l-6-3-6 3V4a1 1 0 0 1 1-1Z"/><path d="M12 8v6"/><path d="M9 11h6"/></svg>
          </button>
          <button class="metric" data-comment-record="${escapeHtml(record.recordId)}" aria-label="评论">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>
            ${record.commentCount}
          </button>
        </div>
        ${commentPanel}
      </article>`;
    }

    function renderPager(total) {
      const pageCount = Math.max(1, Math.ceil(total / state.pageSize));
      state.page = Math.min(state.page, pageCount);
      if (pageCount <= 1) {
        $("pager").innerHTML = "";
        return;
      }
      const pages = [];
      for (let i = 1; i <= pageCount; i += 1) {
        if (i <= 5 || i === pageCount || Math.abs(i - state.page) <= 1) pages.push(i);
      }
      const uniquePages = [...new Set(pages)];
      $("pager").innerHTML = uniquePages.map((p, i) => {
        const gap = i > 0 && p - uniquePages[i - 1] > 1 ? "<span>...</span>" : "";
        return `${gap}<button class="${p === state.page ? "active" : ""}" data-page="${p}">${p}</button>`;
      }).join("");
    }

    function baseFilteredRecords() {
      const q = state.search.toLowerCase().trim();
      return state.records.filter((record) => {
        const tagText = (record.autoTags || []).map(autoTagLabel).join(" ");
        const text = [record.title, record.description, record.remark, record.planner, record.proposer, record.recordId, tagText].join(" ").toLowerCase();
        return (!q || text.includes(q))
          && (!state.planner || record.module === state.planner)
          && (!state.tagFilter || (record.autoTags || []).some((tag) => autoTagLabel(tag) === state.tagFilter));
      });
    }

    function renderMyAttentionTabs() {
      const container = $("myAttentionTabs");
      if (!container) return;
      const show = state.activeTab === "mine";
      container.classList.toggle("show", show);
      if (!show) {
        container.innerHTML = "";
        return;
      }
      const records = baseFilteredRecords();
      const scopes = [
        ["proposed", "我的反馈"],
        ["liked_saved", "点赞收藏"],
        ["commented", "我评论的"],
        ["mentioned", "提到我的"]
      ];
      container.innerHTML = scopes.map(([key, label]) => {
        const count = records.filter((record) => {
          const flags = myAttentionFlags(record);
          return {
            proposed: flags.proposed,
            liked_saved: flags.likedSaved,
            commented: flags.commented,
            mentioned: flags.mentioned
          }[key];
        }).length;
        return `<button class="my-attention-tab ${state.myAttentionScope === key ? "active" : ""}" data-my-attention="${key}">
          ${label}<span>${count}</span>
        </button>`;
      }).join("");
    }

    function renderFeed() {
      if (state.navMode === "settings") {
        renderNotificationSettings();
        return;
      }
      if (state.navMode === "platform-settings") {
        renderPlatformSettings();
        return;
      }
      if (state.navMode === "planner-table") {
        renderPlannerTable();
        return;
      }
      renderMyAttentionTabs();
      const items = filteredRecords();
      const start = (state.page - 1) * state.pageSize;
      const pageItems = items.slice(start, start + state.pageSize);
      $("feed").innerHTML = pageItems.length ? pageItems.map(renderItem).join("") : '<div class="empty-state">没有符合条件的反馈</div>';
      renderPager(items.length);
    }

    function statusClass(value) {
      if (isClosed({ status: value })) return "done";
      if (value === "处理中") return "doing";
      if (value === "策划已采纳") return "accepted";
      if (value === "后续版本处理") return "future";
      if (value === "设计中") return "design";
      return "todo";
    }

    function priorityClass(value) {
      return String(value || "").toLowerCase();
    }

    function displayPriority(value) {
      return value && value !== "未填" ? value : "P3";
    }

    function priorityRank(value) {
      return { P0: 0, P1: 1, P2: 2, P3: 3 }[displayPriority(value)] ?? 4;
    }

    function statusRank(value) {
      if (value === "处理中") return 0;
      if (value === "策划已采纳") return 1;
      if (value === "设计中") return 2;
      if (isClosed({ status: value })) return 3;
      if (value === "未填" || !value) return 4;
      return 2;
    }

    function renderPlannerAttachments(record) {
      const attachments = record.attachments || [];
      const visible = attachments.slice(0, 2);
      if (!visible.length) return '<span class="planner-attachment-empty">无</span>';
      return `<div class="planner-attachments">
        ${visible.map((asset) => {
          if (!asset.path) return `<span class="planner-attachment-thumb" title="${escapeHtml(`${asset.fieldName || "附件"}：${asset.name || "下载失败"}`)}">${asset.downloadStatus === "failed" ? "失败" : "附件"}</span>`;
          const media = asset.isVideo
            ? `<video src="${escapeHtml(asset.path)}" muted preload="metadata"></video>`
            : `<img src="${escapeHtml(asset.path)}" alt="${escapeHtml(asset.name || "附件")}" loading="lazy" />`;
          return `<button type="button" class="planner-attachment-thumb" data-preview-src="${escapeHtml(asset.path)}" data-preview-name="${escapeHtml(asset.name || "附件")}" data-preview-kind="${asset.isVideo ? "video" : "image"}" title="${escapeHtml(asset.name || "附件")}">${media}</button>`;
        }).join("")}
        ${attachments.length > visible.length ? `<span class="planner-attachment-thumb more">+${attachments.length - visible.length}</span>` : ""}
      </div>`;
    }

    const FEISHU_CREATE_ISSUE_URL = "https://project.feishu.cn/t0k6tk/issue/create?parentUrl=%2Ft0k6tk%2Fissue%2Fhomepage";
    const FEISHU_ISSUE_DETAIL_PATTERN = /https:\/\/project\.feishu\.cn\/t0k6tk\/issue\/detail\/\d+/;

    function extractIssueDetailLink(value) {
      return String(value || "").match(FEISHU_ISSUE_DETAIL_PATTERN)?.[0] || "";
    }

    function issueLinkFromRecord(record) {
      for (const value of [record.remark, record.raw?.[FIELD.remark]]) {
        const link = extractIssueDetailLink(value);
        if (link) return link;
      }
      for (const comment of record.comments || []) {
        const link = extractIssueDetailLink(comment.body);
        if (link) return link;
      }
      return "";
    }

    function plannerFilterNames(records = state.records) {
      return uniqueNames([
        ...(state.plannerOptions || []).map((item) => normalizePlannerName(item.name))
      ].filter((name) => name && !["未填", "未分配", "平台反馈"].includes(name)));
    }

    function renderPlannerPickerOption(name, value, selected, valueAttr) {
      const isActive = selected === value;
      const optionClass = ["planner-picker-option", isActive ? "active" : "", name === "未分配" ? "unassigned" : ""].filter(Boolean).join(" ");
      return `<button class="${optionClass}" type="button" ${valueAttr}="${escapeHtml(value)}">
        ${renderPersonIdentity(name, "plain")}
        <span class="planner-picker-check">${isActive ? "✓" : ""}</span>
      </button>`;
    }

    function renderPlannerOwnerPicker(records) {
      const selected = state.plannerOwner || "";
      const label = selected || "全部策划";
      const options = plannerFilterNames(records);
      return `<div class="planner-picker planner-filter-picker" data-planner-owner-picker>
        <button class="planner-picker-button" type="button" data-planner-owner-toggle>
          ${renderPersonIdentity(label, "plain")}
          <span class="planner-picker-arrow">⌄</span>
        </button>
        <div class="planner-picker-menu">
          ${renderPlannerPickerOption("全部策划", "", selected, "data-planner-owner-value")}
          ${options.map((name) => renderPlannerPickerOption(name, name, selected, "data-planner-owner-value")).join("")}
        </div>
      </div>`;
    }

    function selectedPlannerStatuses() {
      return (Array.isArray(state.plannerStatus) ? state.plannerStatus : [state.plannerStatus]).filter(Boolean);
    }

    function plannerStatusFilterLabel() {
      const selected = selectedPlannerStatuses();
      if (!selected.length) return "全部状态";
      if (selected.length === 1) return selected[0];
      return `已选 ${selected.length} 项`;
    }

    function renderPlannerStatusFilterOption(status, selected) {
      const isActive = selected.includes(status);
      const optionClass = ["planner-picker-option", "planner-status-filter-option", isActive ? "active" : ""].filter(Boolean).join(" ");
      return `<button class="${optionClass}" type="button" data-planner-status-value="${escapeHtml(status)}">
        <span>${escapeHtml(status)}</span>
        <span class="planner-picker-check">${isActive ? "✓" : ""}</span>
      </button>`;
    }

    function renderPlannerStatusFilter(records) {
      const selected = selectedPlannerStatuses();
      const values = uniqueNames([
        ...PLANNER_STATUS_OPTIONS,
        ...records.map((record) => record.status)
      ].filter(Boolean));
      return `<div class="planner-picker planner-filter-picker" data-planner-status-picker>
        <button class="planner-picker-button" type="button" data-planner-status-toggle>
          <span>${escapeHtml(plannerStatusFilterLabel())}</span>
          <span class="planner-picker-arrow">⌄</span>
        </button>
        <div class="planner-picker-menu">
          <button class="planner-picker-option ${selected.length ? "" : "active"}" type="button" data-planner-status-clear>
            <span>全部状态</span>
            <span class="planner-picker-check">${selected.length ? "" : "✓"}</span>
          </button>
          ${values.map((status) => renderPlannerStatusFilterOption(status, selected)).join("")}
        </div>
      </div>`;
    }

    function renderPlannerTableSelect(record) {
      const options = plannerOptionNames(record);
      const selected = normalizePlannerName(record.assignedPlanner || (options.includes(normalizePlannerName(record.planner)) ? record.planner : ""));
      return `<div class="planner-picker planner-cell-picker" data-table-planner-picker="${escapeHtml(record.recordId)}">
        <button class="planner-picker-button" type="button" data-table-planner-toggle>
          ${renderPersonIdentity(selected || "未分配", "plain")}
          <span class="planner-picker-arrow">⌄</span>
        </button>
        <div class="planner-picker-menu">
          ${renderPlannerPickerOption("未分配", "", selected, "data-table-planner-value")}
          ${options.map((name) => renderPlannerPickerOption(name, name, selected, "data-table-planner-value")).join("")}
        </div>
      </div>`;
    }

    function plannerStatusOptions(record) {
      return uniqueNames([
        ...PLANNER_STATUS_OPTIONS,
        record.assignedStatus,
        record.status,
        record.baseStatus
      ].filter(Boolean));
    }

    function plannerPriorityOptions(record) {
      return uniqueNames([
        ...PLANNER_PRIORITY_OPTIONS,
        record.assignedPriority,
        record.priority,
        record.basePriority
      ].filter(Boolean));
    }

    function renderPlannerStatusSelect(record) {
      const selected = record.status || "未填";
      const options = plannerStatusOptions(record);
      return `<select class="planner-status-select status-chip ${escapeHtml(statusClass(selected))}" data-table-status-record="${escapeHtml(record.recordId)}" aria-label="处理状态">
        ${options.map((status) => `<option value="${escapeHtml(status)}" ${status === selected ? "selected" : ""}>${escapeHtml(status)}</option>`).join("")}
      </select>`;
    }

    function renderFullStatusOptions(records, selected, emptyLabel) {
      const values = uniqueNames([
        ...PLANNER_STATUS_OPTIONS,
        ...records.map((record) => record.status)
      ].filter(Boolean));
      return `<option value="">${emptyLabel}</option>` + values.map((value) => `<option value="${escapeHtml(value)}" ${value === selected ? "selected" : ""}>${escapeHtml(value)}</option>`).join("");
    }

    function assignedPlannerName(record) {
      return normalizePlannerName(record.assignedPlanner || record.planner || record.basePlanner || "");
    }

    function isConcretePlannerName(name) {
      const text = normalizePlannerName(name);
      return Boolean(text && !["未填", "未分配", "平台反馈"].includes(text));
    }

    function latestAssignedPlannerComment(record) {
      const plannerName = assignedPlannerName(record);
      if (!isConcretePlannerName(plannerName)) return null;
      return (record.comments || [])
        .slice()
        .sort((a, b) => timestampValue(b.created_at) - timestampValue(a.created_at))
        .find((comment) => normalizePlannerName(comment.author_name || "") === plannerName) || null;
    }

    function plannerRemarkEditorValue(record) {
      const plannerName = assignedPlannerName(record);
      const noteAuthor = normalizePlannerName(record.plannerNoteAuthorName || "");
      const noteValue = strip(record.plannerNote || "");
      if (noteValue && (!noteAuthor || noteAuthor === plannerName)) return record.plannerNote;
      return latestAssignedPlannerComment(record)?.body || "";
    }

    function renderPlannerRemarkEditor(record) {
      const noteValue = plannerRemarkEditorValue(record);
      return `<div class="planner-remark-editor">
        <textarea class="planner-remark-input" data-planner-note-input="${escapeHtml(record.recordId)}" rows="5" placeholder="输入备注，5分钟后同步到评论">${escapeHtml(noteValue)}</textarea>
      </div>`;
    }

    function renderPlannerRecordRow(record) {
      const issueLink = issueLinkFromRecord(record);
      const actionLink = issueLink || FEISHU_CREATE_ISSUE_URL;
      const actionLabel = issueLink ? "查看单子" : "开单";
      const actionClass = issueLink ? "table-action link success" : "table-action link";
      return `<tr data-record-id="${escapeHtml(record.recordId)}">
        <td class="feedback-cell"><button class="planner-title-button truncate-2" type="button" data-open-record="${escapeHtml(record.recordId)}">${escapeHtml(record.title)}</button><div class="auto-tags planner-title-tags">${renderAutoTags(record, { limit: 3 })}</div></td>
        <td>${renderPlannerAttachments(record)}</td>
        <td class="remark-cell">${renderPlannerRemarkEditor(record)}</td>
        <td>${renderPlannerTableSelect(record)}</td>
        <td><span class="priority-chip ${escapeHtml(priorityClass(displayPriority(record.priority)))}">${escapeHtml(displayPriority(record.priority))}</span></td>
        <td>${renderPlannerStatusSelect(record)}</td>
        <td class="heat-cell">${record.likeCount} 赞<span>${record.commentCount} 评</span></td>
        <td>${renderPersonIdentity(record.proposer, "compact")}</td>
        <td>${escapeHtml((record.createdTime || "").slice(5, 16) || "未知")}</td>
        <td><a class="${actionClass}" href="${escapeHtml(actionLink)}" target="_blank" rel="noopener">${actionLabel}</a></td>
        <td><button class="table-action" data-open-record="${escapeHtml(record.recordId)}">查看</button></td>
      </tr>`;
    }

    function renderGroupedPlannerRows(rows) {
      const sortedRows = [...rows].sort((a, b) => {
        return priorityRank(a.priority) - priorityRank(b.priority)
          || statusRank(a.status) - statusRank(b.status)
          || (b.likeCount + b.commentCount) - (a.likeCount + a.commentCount)
          || b.no - a.no;
      });
      const groups = [];
      sortedRows.forEach((record) => {
        const priority = displayPriority(record.priority);
        const status = record.status || "未填";
        const key = `${priority}::${status}`;
        let group = groups.find((item) => item.key === key);
        if (!group) {
          group = { key, priority, status, records: [] };
          groups.push(group);
        }
        group.records.push(record);
      });
      return groups.map((group) => `
        <tr class="planner-group-row">
          <td colspan="11">
            <span class="planner-group-label">
              <button class="planner-group-toggle" type="button" data-planner-group="${escapeHtml(group.key)}" aria-label="${state.plannerExpandedGroups[group.key] ? "收起分组" : "展开分组"}">${state.plannerExpandedGroups[group.key] ? "v" : ">"}</button>
              ${escapeHtml(group.priority)} / ${escapeHtml(group.status)} <span>${group.records.length} 条</span>
            </span>
          </td>
        </tr>
        ${state.plannerExpandedGroups[group.key] ? group.records.map(renderPlannerRecordRow).join("") : ""}
      `).join("");
    }

    function renderPlannerOptions(records, key, selected, emptyLabel) {
      const values = [...new Set(records.map((record) => record[key]).filter(Boolean))].sort((a, b) => a.localeCompare(b, "zh-CN"));
      return `<option value="">${emptyLabel}</option>` + values.map((value) => `<option value="${escapeHtml(value)}" ${value === selected ? "selected" : ""}>${escapeHtml(value)}</option>`).join("");
    }

    function autoTagLabel(tag) {
      return typeof tag === "string" ? tag : tag?.label;

    function countAutoTags(records) {
      const map = new Map();
      for (const record of records) {
        for (const label of (record.autoTags || []).map(autoTagLabel).filter(Boolean)) {
          map.set(label, (map.get(label) || 0) + 1);
        }
      }
      return [...map.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
    }

    function latestPlannerReply(record) {
      const latestComment = (record.comments || []).slice().sort((a, b) => timestampValue(b.created_at) - timestampValue(a.created_at))[0];
      const noteText = strip(record.plannerNote || record.remark || "");
      const candidates = [];
      if (noteText) {
        candidates.push({
          record,
          actor: record.planner || latestComment?.author_name || "未分配",
          updatedAt: record.plannerNoteDirtyAt || record.plannerNoteSyncedAt || record.updatedTime || record.createdTime,
          body: noteText
        });
      }
      if (latestComment) {
        candidates.push({
          record,
          actor: latestComment.author_name || record.planner || "平台用户",
          updatedAt: latestComment.created_at || record.updatedTime || record.createdTime,
          body: latestComment.body || ""
        });
      }
      if (isReplied(record)) {
        candidates.push({
          record,
          actor: record.planner || "未分配",
          updatedAt: record.updatedTime || record.createdTime,
          body: record.status || ""
        });
      }
      return candidates.sort((a, b) => timestampValue(b.updatedAt) - timestampValue(a.updatedAt))[0] || null;
    }

    function canDeleteRecord(record) {
      const user = state.currentUser;
      if (!record || !user) return false;
      if (user.is_admin) return true;
      if (record.source !== "platform") return false;
      const userKeys = [user.open_id, user.union_id, user.email].filter(Boolean);
      const proposerKeys = [record.proposerKey, ...(record.proposerKeys || [])].filter(Boolean);
      const proposerEmails = [record.proposerEmail, ...(record.proposerEmails || [])].filter(Boolean);
      return proposerKeys.some((key) => userKeys.includes(key))
        || proposerEmails.some((email) => userKeys.includes(email))
        || Boolean(record.proposer && record.proposer === user.name);
    }

    function canEditFeedbackContent(record) {
      return Boolean(record?.source === "platform" && canDeleteRecord(record));
    }

    function canEditRecordTags(record) {
      const user = state.currentUser;
      if (!record || !user) return false;
      if (user.is_admin || user.is_planner) return true;
      const currentName = normalizePlannerName(user.name || "");
      const plannerName = normalizePlannerName(record.planner || "");
      return Boolean(currentName && plannerName && currentName === plannerName);
    }

    function canDeleteComment(comment) {
      const user = state.currentUser;
      if (!comment || !user) return false;
      if (user.is_admin) return true;
      const name = user.name || "";
      const userKeys = [user.open_id, user.union_id, user.email, name].filter(Boolean);
      return userKeys.includes(comment.author_key);
    }

    function myAttentionFlags(record) {
      const user = state.currentUser;
      if (!record || !user) {
        return { proposed: false, likedSaved: false, commented: false, mentioned: false };
      }
      const name = user.name || "";
      const userKeys = [user.open_id, user.union_id, user.email].filter(Boolean);
      const proposerKeys = [record.proposerKey, ...(record.proposerKeys || [])].filter(Boolean);
      const proposerEmails = [record.proposerEmail, ...(record.proposerEmails || [])].filter(Boolean);
      const proposedByMe = proposerKeys.some((key) => userKeys.includes(key))
        || proposerEmails.some((email) => userKeys.includes(email))
        || Boolean(name && record.proposer === name);
      const likedByMe = Boolean(record.likedByMe)
        || Boolean(name && String(record.likeUsers || "").includes(name));
      const followedByMe = Boolean(record.followedByMe);
      const commentedByMe = (record.comments || []).some((comment) => {
        return userKeys.includes(comment.author_key) || Boolean(name && comment.author_name === name);
      });
      const matchedTeamMember = (state.teamMembers || []).find((member) => {
        const memberKeys = [member.id, member.open_id, member.union_id, member.email, member.name].filter(Boolean);
        return memberKeys.some((value) => userKeys.includes(value) || Boolean(name && value === name));
      });
      const assignedToMe = Boolean(name && [record.assignedPlanner, record.planner, record.basePlanner].includes(name))
        || Boolean(matchedTeamMember?.id && record.assignedPlannerKey === matchedTeamMember.id);
      const mentionedMe = Boolean(name && [
        record.title,
        record.description,
        record.remark,
        ...(record.comments || []).map((comment) => comment.body)
      ].join(" ").includes(name));
      return {
        proposed: proposedByMe,
        likedSaved: likedByMe || followedByMe,
        commented: commentedByMe,
        mentioned: mentionedMe || assignedToMe
      };
    }

    function isMyAttentionRecord(record) {
      const flags = myAttentionFlags(record);
      return flags.proposed || flags.likedSaved || flags.commented || flags.mentioned;
    }

    function matchesMyAttentionScope(record) {
      const flags = myAttentionFlags(record);
      return {
        proposed: flags.proposed,
        liked_saved: flags.likedSaved,
        commented: flags.commented,
        mentioned: flags.mentioned
      }[state.myAttentionScope] || false;
    }

    function extractPersonNames(value) {
      if (!value) return [];
      if (Array.isArray(value)) {
        return value.flatMap((item) => {
          if (!item) return [];
          if (typeof item === "object") return [item.name, item.en_name, item.email, item.id].filter(Boolean).slice(0, 1);
          return extractPersonNames(String(item));
        });
      }
      return String(value)
        .split(/[,，、\n]/)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function uniqueNames(names) {
      const seen = new Set();
      return names.filter((name) => {
        const value = strip(name);
        if (!value || seen.has(value)) return false;
        seen.add(value);
        return true;
      });
    }

    function likedPeople(record) {
      return uniqueNames([
        ...extractPersonNames(record.raw?.[FIELD.likeUsers]),
        ...extractPersonNames(record.likeUsers),
        ...(record.localLikedUsers || []).map((item) => item.user_name)
      ]);
    }

    function plannerOptionNames(record) {
      return uniqueNames((state.plannerOptions || []).map((item) => normalizePlannerName(item.name)).filter(Boolean));
    }

    function mentionOptionNames() {
      return uniqueNames((state.plannerOptions || []).map((item) => normalizePlannerName(item.name)).filter(Boolean));
    }

    function isMentionInput(target) {
      return Boolean(target?.matches?.('[data-planner-note-input], .comment-form input[name="comment"]'));
    }

    function mentionMatch(input) {
      const cursor = input.selectionStart ?? input.value.length;
      const beforeCursor = input.value.slice(0, cursor);
      const match = beforeCursor.match(/@([^\s@]*)$/);
      if (!match) return null;
      return {
        triggerIndex: cursor - match[0].length,
        query: match[1] || "",
      };
    }

    function positionMentionMenu(input) {
      const rect = input.getBoundingClientRect();
      const menu = $("mentionMenu");
      const width = Math.min(240, window.innerWidth - 24);
      const left = Math.min(Math.max(12, rect.left), Math.max(12, window.innerWidth - width - 12));
      const top = Math.min(rect.bottom + 6, window.innerHeight - 280);
      menu.style.left = `${left}px`;
      menu.style.top = `${Math.max(12, top)}px`;
      menu.style.width = `${width}px`;
    }

    function renderMentionMenu() {
      const menu = $("mentionMenu");
      if (!mentionState.input || !mentionState.options.length) {
        menu.innerHTML = mentionState.input ? '<div class="mention-empty">没有匹配的策划成员</div>' : "";
        menu.classList.toggle("show", Boolean(mentionState.input));
        if (mentionState.input) positionMentionMenu(mentionState.input);
        return;
      }
      menu.innerHTML = mentionState.options.map((name, index) => `
        <button class="mention-option ${index === mentionState.activeIndex ? "active" : ""}" type="button" role="option" data-mention-name="${escapeHtml(name)}">
          ${renderPersonIdentity(name, "plain compact")}
          <span>@</span>
        </button>
      `).join("");
      menu.classList.add("show");
      positionMentionMenu(mentionState.input);
    }

    function closeMentionMenu() {
      mentionState.input = null;
      mentionState.triggerIndex = -1;
      mentionState.query = "";
      mentionState.activeIndex = 0;
      mentionState.options = [];
      $("mentionMenu").classList.remove("show");
      $("mentionMenu").innerHTML = "";
    }

    function updateMentionMenu(input) {
      if (!isMentionInput(input)) {
        closeMentionMenu();
        return;
      }
      const match = mentionMatch(input);
      if (!match) {
        closeMentionMenu();
        return;
      }
      const query = match.query.trim().toLowerCase();
      const options = mentionOptionNames().filter((name) => !query || name.toLowerCase().includes(query));
      mentionState.input = input;
      mentionState.triggerIndex = match.triggerIndex;
      mentionState.query = match.query;
      mentionState.activeIndex = 0;
      mentionState.options = options;
      renderMentionMenu();
    }

    function insertMention(name) {
      const input = mentionState.input;
      if (!input || mentionState.triggerIndex < 0) return;
      const cursor = input.selectionStart ?? input.value.length;
      const before = input.value.slice(0, mentionState.triggerIndex);
      const after = input.value.slice(cursor);
      const insertion = `@${name} `;
      input.value = `${before}${insertion}${after}`;
      const nextCursor = before.length + insertion.length;
      input.focus();
      input.setSelectionRange(nextCursor, nextCursor);
      input.dispatchEvent(new Event("input", { bubbles: true }));
      closeMentionMenu();
    }

    function handleMentionInput(event) {
      if (isMentionInput(event.target)) updateMentionMenu(event.target);
    }

    function handleMentionKeydown(event) {
      if (!$("mentionMenu").classList.contains("show") || event.target !== mentionState.input) return false;
      if (event.key === "Escape") {
        closeMentionMenu();
        event.preventDefault();
        return true;
      }
      if (!mentionState.options.length) return false;
      if (event.key === "ArrowDown" || event.key === "ArrowUp") {
        const direction = event.key === "ArrowDown" ? 1 : -1;
        mentionState.activeIndex = (mentionState.activeIndex + direction + mentionState.options.length) % mentionState.options.length;
        renderMentionMenu();
        event.preventDefault();
        return true;
      }
      if (event.key === "Enter" || event.key === "Tab") {
        insertMention(mentionState.options[mentionState.activeIndex]);
        event.preventDefault();
        return true;
      }
      return false;
    }

    async function saveEditedRecord() {
      const record = state.records.find((item) => item.recordId === state.detailRecordId);
      if (!record || !canEditFeedbackContent(record)) return;
      const description = $("editDescription")?.value.trim() || "";
      if (description.length < 10) {
        showEditMessage("请至少输入 10 个字符，让处理人能看懂问题。", "error");
        return;
      }
      if (currentEditAttachmentCount(record) > 9) {
        showEditMessage("附件最多保留 9 个。", "error");
        return;
      }
      const button = $("saveRecordButton");
      button.disabled = true;
      button.textContent = "保存中...";
      showEditMessage("正在保存修改...");
      try {
        const formData = new FormData();
        formData.append("record_id", record.recordId);
        formData.append("description", description);
        formData.append("keep_attachment_ids", JSON.stringify([...editState.keepAttachmentIds]));
        editState.files.forEach((file) => formData.append("attachments", file, file.name));
        const response = await fetch("/api/platform-feedback/update", {
          method: "POST",
          body: formData
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || "保存失败");
        const updatedRecord = platformFeedbackToRecord(payload.feedback);
        const index = state.records.findIndex((item) => item.recordId === record.recordId);
        if (index >= 0) state.records[index] = applyInteractions([updatedRecord])[0];
        fillFilters();
        renderRightPanel();
        renderFeed();
        openDetail(record.recordId);
      } catch (error) {
        showEditMessage(error.message || "保存失败，请稍后再试。", "error");
      } finally {
        button.disabled = false;
        button.textContent = "保存修改";
      }
    }

    function openDetail(recordId) {

      if (!record) return;
      closeEditRecordMode();
      state.detailRecordId = recordId;
      $("modalLabels").innerHTML = renderDetailLabels(record);
      $("modalTitle").textContent = record.title;
      $("modalRemark").textContent = record.remark || record.description || "暂无补充说明";
      $("modalAssets").innerHTML = renderDetailAssets(record);

      renderDetailComments(record);

    async function deleteCurrentRecord() {
      const record = state.records.find((item) => item.recordId === state.detailRecordId);
      if (!record || !canDeleteRecord(record)) return;
      if (!window.confirm("确认删除这条记录吗？删除后会同时移除它在平台数据库里的附件、点赞和评论。")) return;

      const button = $("deleteRecordButton");
      button.disabled = true;
      button.textContent = "删除中...";
      try {
        const endpoint = record.source === "platform"
          ? `/api/platform-feedback/${encodeURIComponent(record.recordId)}`
          : `/api/records/${encodeURIComponent(record.recordId)}`;
        const response = await fetch(endpoint, { method: "DELETE" });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || "删除失败");
        state.records = state.records.filter((item) => item.recordId !== record.recordId);
        delete state.interactions[record.recordId];
        state.detailRecordId = "";
        $("detailModal").classList.remove("show");
        fillFilters();
        renderRightPanel();
        renderFeed();
      } catch (error) {
        alert(error.message || "删除失败，请稍后再试。");
      } finally {
        button.disabled = false;
        button.textContent = "删除记录";
      }
    }

    async function submitFeedback(event) {
      event.preventDefault();
      const description = $("submitDescription").value.trim();
      if (description.length < 10) {
        showSubmitMessage("请至少输入 10 个字符，让处理人能看懂问题。", "error");
        return;
      }
      if (submitState.files.length > 9) {
        showSubmitMessage("附件最多上传 9 个。", "error");
        return;
      }

      const button = $("confirmSubmit");
      button.disabled = true;
      button.textContent = "提交中...";
      showSubmitMessage("正在保存到平台数据库...");

      try {
        const formData = new FormData();
        formData.append("feedback_type", new FormData($("submitForm")).get("feedbackType"));
        formData.append("description", description);
        formData.append("proposer", state.currentUser?.name || "平台用户");
        submitState.files.forEach((file) => formData.append("attachments", file, file.name));

        const response = await fetch("/api/platform-feedback", {
          method: "POST",
          body: formData
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || "提交失败");

        const record = platformFeedbackToRecord(payload.feedback);
        state.records.unshift(record);
        state.activeTab = "mine";
        state.myAttentionScope = "proposed";
        state.sort = "new";

        button.textContent = "提交反馈";
      }
    }

    async function assignPlanner(recordId, plannerName, options = {}) {

      const reopenDetail = options.reopenDetail ?? Boolean(state.detailRecordId === recordId && $("detailModal").classList.contains("show"));

      const settingsLike = ["settings", "platform-settings"].includes(mode);
      document.querySelector(".app").classList.toggle("settings-view", settingsLike);
      document.querySelector(".main").classList.toggle("settings-mode", settingsLike);
      document.querySelector(".app").classList.toggle("planner-view", mode === "planner-table");
      document.querySelector(".main").classList.toggle("planner-mode", mode === "planner-table");

      state.planner = "";
      state.tagFilter = "";
      state.page = 1;

      $("plannerFilter").value = "";
      $("tagFilter").value = "";

        $("sortSelect").value = "updated";
        setActiveMainTab("hot");

      } else if (mode === "planner-table") {

        setPageTitle("策划统计表", "集中查看 X03 测试反馈，按负责人、状态和优先级推进处理。");

    async function saveNotificationSetting(key, enabled) {
      const target = state.notificationSettings.find((item) => item.key === key);
      if (target) target.enabled = enabled ? 1 : 0;
      renderNotificationSettings();
      try {
        const response = await fetch("/api/notification-settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ key, enabled })
        });
        if (!response.ok) throw new Error("保存失败");
        const payload = await response.json();
        state.notificationSettings = payload.settings || state.notificationSettings;
        state.notifications = payload.notifications || state.notifications;
        state.unreadCount = payload.unread_count || 0;
        updateNotificationChrome();
        renderNotificationSettings();
      } catch {
        if (target) target.enabled = enabled ? 0 : 1;
        renderNotificationSettings();
        updateNotificationChrome();
        alert("通知中心设置保存失败，请稍后再试。");
      }
    }

    async function markAllNotificationsRead() {
      try {
        const response = await fetch("/api/notifications/read-all", { method: "POST" });
        if (!response.ok) throw new Error("保存失败");
        const payload = await response.json();
        state.notificationSettings = payload.settings || state.notificationSettings;
        state.notifications = payload.notifications || [];
        state.unreadCount = payload.unread_count || 0;
        updateNotificationChrome();
        renderNotificationSettings();
      } catch {
        alert("通知状态保存失败，请稍后再试。");
      }
    }

    async function openNotificationRecord(recordId, notificationId) {
      if (!recordId) return;
      openDetail(recordId);
      const target = state.notifications.find((item) => item.id === notificationId);
      if (target && !Number(target.read)) {
        target.read = 1;
        state.unreadCount = Math.max(0, Number(state.unreadCount || 0) - 1);
        updateNotificationChrome();
        renderNotificationSettings();
      }
      if (!notificationId) return;
      try {
        const response = await fetch("/api/notifications/read", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: notificationId })
        });
        if (!response.ok) throw new Error("保存失败");
        const payload = await response.json();
        state.notificationSettings = payload.settings || state.notificationSettings;
        state.notifications = payload.notifications || state.notifications;
        state.unreadCount = payload.unread_count || 0;
        updateNotificationChrome();
        renderNotificationSettings();
      } catch {
        loadNotificationSettings().then(updateNotificationChrome).catch(() => {});
      }
    }

    async function saveTeamRole(memberId, role, enabled) {
      const field = role === "planner" ? "is_planner" : "is_admin";
      const endpoint = role === "planner" ? "/api/team-members/planner" : "/api/team-members/admin";
      const target = state.teamMembers.find((item) => item.id === memberId);
      if (target) target[field] = enabled ? 1 : 0;
      renderPlatformSettings();
      try {
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ member_id: memberId, [field]: enabled })
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || "保存失败");
        state.teamMembers = payload.members || state.teamMembers;
        state.plannerOptions = state.teamMembers
          .filter((item) => Number(item.is_planner))
          .map((item) => ({ id: item.id, name: item.name }));
        if (state.currentUser) {
          const userMember = state.teamMembers.find((item) => {
            const keys = [item.open_id, item.union_id, item.email, item.name].filter(Boolean);
            return keys.includes(state.currentUser.open_id)
              || keys.includes(state.currentUser.union_id)
              || keys.includes(state.currentUser.email)
              || item.name === state.currentUser.name;
          });
          state.currentUser.is_admin = Boolean(userMember?.is_admin);
          state.currentUser.is_planner = Boolean(userMember?.is_planner);
        }
        updateAdminNavigation();
        renderPlatformSettings();
      } catch (error) {
        await loadTeamMembers();
        renderPlatformSettings();
        alert(error.message || "角色设置保存失败，请稍后再试。");
      }
    }

    function closePlannerPickers(exceptPicker = null) {
      document.querySelectorAll("#feed .planner-picker.open").forEach((picker) => {
        if (picker !== exceptPicker) picker.classList.remove("open");
      });
    }

    function handlePlannerInteraction(event) {
      const pickerToggle = event.target.closest("[data-planner-owner-toggle], [data-planner-status-toggle], [data-table-planner-toggle]");
      if (pickerToggle) {
        const picker = pickerToggle.closest(".planner-picker");
        const wasOpen = picker?.classList.contains("open");
        closePlannerPickers(picker);
        picker?.classList.toggle("open", !wasOpen);
        return true;
      }

      const ownerOption = event.target.closest("[data-planner-owner-value]");
      if (ownerOption) {
        state.plannerOwner = ownerOption.dataset.plannerOwnerValue || "";
        closePlannerPickers();
        renderPlannerTable();
        return true;
      }

      const statusClear = event.target.closest("[data-planner-status-clear]");
      if (statusClear) {
        state.plannerStatus = [];
        renderPlannerTable();
        return true;
      }

      const statusOption = event.target.closest("[data-planner-status-value]");
      if (statusOption) {
        const status = statusOption.dataset.plannerStatusValue || "";
        const selected = new Set(selectedPlannerStatuses());
        if (selected.has(status)) selected.delete(status);
        else selected.add(status);
        state.plannerStatus = [...selected];
        renderPlannerTable();
        document.querySelector("[data-planner-status-picker]")?.classList.add("open");
        return true;
      }

      const tablePlannerOption = event.target.closest("[data-table-planner-value]");
      if (tablePlannerOption) {
        const picker = tablePlannerOption.closest("[data-table-planner-picker]");
        const recordId = picker?.dataset.tablePlannerPicker;
        closePlannerPickers();
        if (recordId) assignPlanner(recordId, tablePlannerOption.dataset.tablePlannerValue || "", { reopenDetail: false });
        return true;
      }

      const groupToggle = event.target.closest("[data-planner-group]");
      if (groupToggle) {
        const key = groupToggle.dataset.plannerGroup;
        state.plannerExpandedGroups[key] = !state.plannerExpandedGroups[key];
        renderPlannerTable();
        return true;
      }

      const scopeCard = event.target.closest("[data-planner-scope]");
      if (scopeCard) {
        state.plannerScope = scopeCard.dataset.plannerScope;
        renderPlannerTable();
        return true;
      }

      const openButton = event.target.closest("[data-open-record]");
      if (openButton) {
        openDetail(openButton.dataset.openRecord);
        return true;
      }

      if (event.target.closest("#clearPlannerFilters")) {
        state.plannerScope = "all";
        state.plannerSearch = "";
        state.plannerOwner = "";
        state.plannerStatus = [];
        state.plannerPriority = "";
        renderPlannerTable();
        return true;
      }
      if (!event.target.closest(".planner-picker")) closePlannerPickers();
      return false;
    }

    function handlePlannerInput(event) {
      const statusSelect = event.target.closest("[data-table-status-record]");
      if (statusSelect) {
        assignStatus(statusSelect.dataset.tableStatusRecord, statusSelect.value, { reopenDetail: false });
        return;
      }
      const plannerNoteInput = event.target.closest("[data-planner-note-input]");
      if (plannerNoteInput) {
        queuePlannerNoteSave(plannerNoteInput.dataset.plannerNoteInput, plannerNoteInput.value);
        return;
      }
      if (event.target.id === "plannerSearch") {
        state.plannerSearch = event.target.value;
        refreshPlannerTableResults();
      }
      if (event.target.id === "plannerOwnerFilter") {
        state.plannerOwner = event.target.value;
        renderPlannerTable();
      }
      if (event.target.id === "plannerPriorityFilter") {
        state.plannerPriority = event.target.value;
        renderPlannerTable();
      }
      if (event.target.id === "plannerScopeFilter") {
        state.plannerScope = event.target.value;
        renderPlannerTable();
      }
    }

    function openNotificationCenter() {
      const button = document.querySelector('[data-nav="settings"]');
      if (!button) return;
      state.notificationToastDismissedAt = Number(state.unreadCount || 0);
      handleSidebarNavigation(button);
      updateNotificationChrome();
    }

    function bindEvents() {
      $("searchInput").addEventListener("input", (event) => { state.search = event.target.value; state.page = 1; renderFeed(); });
      $("plannerFilter").addEventListener("change", (event) => { state.planner = event.target.value; state.page = 1; renderFeed(); });
      $("tagFilter").addEventListener("change", (event) => { state.tagFilter = event.target.value; state.page = 1; renderFeed(); });
      $("sortSelect").addEventListener("change", (event) => { state.sort = event.target.value; state.page = 1; renderFeed(); });
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
          tab.classList.add("active");
          state.activeTab = tab.dataset.filter;
          if (state.activeTab === "hot") {
            state.sort = "updated";
            $("sortSelect").value = "updated";
          }
          state.page = 1;
          renderFeed();
        });
      });
      $("myAttentionTabs").addEventListener("click", (event) => {
        const button = event.target.closest("[data-my-attention]");
        if (!button) return;
        state.myAttentionScope = button.dataset.myAttention;
        state.page = 1;
        renderFeed();
      });
      $("pager").addEventListener("click", (event) => {
        const page = event.target.closest("button")?.dataset.page;
        if (!page) return;
        state.page = Number(page);
        renderFeed();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
      $("feed").addEventListener("click", (event) => {
        if (event.target.closest("#syncBaseButton")) {
          syncBaseNow();
          return;
        }
        if (event.target.closest("#retryWritebackButton")) {
          retryWritebackNow();
          return;
        }
        if (event.target.closest("#toggleWritebackLogsButton")) {
          state.showWritebackLogs = !state.showWritebackLogs;
          if (state.showWritebackLogs) loadWritebackLogs().then(renderFeed);
          else renderFeed();
          return;
        }
        if (event.target.closest("#retryFailedWritebacksButton")) {
          retryFailedWritebacksNow();
          return;
        }
        const retryOne = event.target.closest("[data-retry-writeback]");
        if (retryOne) {
          retryFailedWritebacksNow([retryOne.dataset.retryWriteback]);
          return;
        }
        const deleteCommentButton = event.target.closest("[data-delete-comment]");
        if (deleteCommentButton) {
          deleteComment(deleteCommentButton.dataset.deleteComment, deleteCommentButton.dataset.deleteCommentRecord);
          return;
        }
        if (state.navMode === "planner-table" && handlePlannerInteraction(event)) return;
        const notificationRecord = event.target.closest("[data-notification-record]");
        if (notificationRecord) {
          openNotificationRecord(notificationRecord.dataset.notificationRecord, notificationRecord.dataset.notificationId);
          return;
        }
        const previewButton = event.target.closest("[data-preview-src]");
        if (previewButton) {
          openMediaPreview(previewButton);
          return;
        }
        const titleButton = event.target.closest("[data-open-record]");
        if (titleButton) {
          openDetail(titleButton.dataset.openRecord);
          return;
        }
        const likeButton = event.target.closest("[data-like-record]");
        if (likeButton) {
          toggleLike(likeButton.dataset.likeRecord);
          return;
        }
        const followButton = event.target.closest("[data-follow-record]");
        if (followButton) {
          toggleFollow(followButton.dataset.followRecord);
          return;
        }
        const commentButton = event.target.closest("[data-comment-record]");
        if (commentButton) {
          state.activeCommentRecord = state.activeCommentRecord === commentButton.dataset.commentRecord ? "" : commentButton.dataset.commentRecord;
          renderFeed();
          return;
        }
        const notificationToggle = event.target.closest("[data-notification-key]");
        if (notificationToggle) {
          saveNotificationSetting(notificationToggle.dataset.notificationKey, notificationToggle.checked);
          return;
        }
        if (event.target.closest("#readAllNotifications")) {
          markAllNotificationsRead();
          return;
        }
      });
      $("feed").addEventListener("submit", (event) => {
        const form = event.target.closest("[data-comment-form]");
        if (!form) return;
        event.preventDefault();
        submitInlineComment(form);
      });
      $("feed").addEventListener("input", (event) => {
        handleMentionInput(event);
        handlePlannerInput(event);
      });
      $("feed").addEventListener("keydown", handleMentionKeydown);
      $("feed").addEventListener("change", (event) => {
        const adminToggle = event.target.closest("[data-admin-member]");
        if (adminToggle) {
          saveTeamRole(adminToggle.dataset.adminMember, "admin", adminToggle.checked);
          return;
        }
        const plannerMemberToggle = event.target.closest("[data-planner-member]");
        if (plannerMemberToggle) {
          saveTeamRole(plannerMemberToggle.dataset.plannerMember, "planner", plannerMemberToggle.checked);
          return;
        }
        handlePlannerInput(event);
      });
      $("closeModal").addEventListener("click", () => {
        state.detailRecordId = "";
        closeEditRecordMode();
        $("detailModal").classList.remove("show");
      });
      $("detailModal").addEventListener("click", (event) => {
        if (event.target.closest("#editRecordButton")) {
          openEditRecordMode();
          return;
        }
        if (event.target.closest("#cancelEditRecord")) {
          closeEditRecordMode();
          return;
        }
        if (event.target.closest("#saveRecordButton")) {
          saveEditedRecord();
          return;
        }
        const addTagButton = event.target.closest("[data-add-tag-record]");
        if (addTagButton) {
          openTagAddMenu(addTagButton.dataset.addTagRecord, addTagButton);
          return;
        }
        const editAttachmentButton = event.target.closest("[data-edit-attachment-id]");
        if (editAttachmentButton) {
          const record = state.records.find((item) => item.recordId === state.detailRecordId);
          const id = editAttachmentButton.dataset.editAttachmentId || "";
          if (id && editState.keepAttachmentIds.has(id)) {
            editState.keepAttachmentIds.delete(id);
          } else if (id) {
            editState.keepAttachmentIds.add(id);
          }
          if (record) {
            $("editExistingAssets").innerHTML = renderEditExistingAttachments(record);
            showEditMessage(`当前将保留 ${currentEditAttachmentCount(record)} 个附件。`);
          }
          return;
        }
        const editFileRemoveButton = event.target.closest("[data-edit-file-index]");
        if (editFileRemoveButton) {
          const [removed] = editState.files.splice(Number(editFileRemoveButton.dataset.editFileIndex), 1);
          if (removed) releaseEditFilePreview(removed);
          renderEditFiles();
          const record = state.records.find((item) => item.recordId === state.detailRecordId);
          if (record) showEditMessage(`当前将保留 ${currentEditAttachmentCount(record)} 个附件。`);
          return;
        }
        const plannerToggle = event.target.closest("[data-planner-menu-toggle]");
        if (plannerToggle) {
          const picker = plannerToggle.closest("#detailPlannerSelect");
          picker?.classList.toggle("open");
          return;
        }
        const plannerOption = event.target.closest("[data-planner-value]");
        if (plannerOption) {
          const picker = plannerOption.closest("#detailPlannerSelect");
          if (picker) assignPlanner(picker.dataset.recordId, plannerOption.dataset.plannerValue || "");
          return;
        }
        const deleteCommentButton = event.target.closest("[data-delete-comment]");
        if (deleteCommentButton) {
          deleteComment(deleteCommentButton.dataset.deleteComment, deleteCommentButton.dataset.deleteCommentRecord);
          return;
        }
        if (!event.target.closest(".planner-picker")) {
          $("detailPlannerSelect")?.classList.remove("open");
        }
        const previewButton = event.target.closest("[data-preview-src]");
        if (previewButton) {
          openMediaPreview(previewButton);
          return;
        }
        if (event.target.id === "detailModal") {
          state.detailRecordId = "";
          closeEditRecordMode();
          $("detailModal").classList.remove("show");
        }
      });
      $("detailModal").addEventListener("contextmenu", (event) => {
        const tag = event.target.closest("[data-detail-auto-tag]");
        if (!tag) return;
        event.preventDefault();
        openTagDeleteMenu(tag.dataset.detailAutoTagRecord, tag.dataset.detailAutoTag, event.clientX, event.clientY);
      });
      $("detailModal").addEventListener("change", (event) => {
        if (event.target.id === "editFiles") {
          addEditFiles(event.target.files || [], "添加");
          event.target.value = "";
          return;
        }
        const statusSelect = event.target.closest("[data-detail-status-record]");
        if (statusSelect) {
          assignStatus(statusSelect.dataset.detailStatusRecord, statusSelect.value, { reopenDetail: true });
          return;
        }
        const prioritySelect = event.target.closest("[data-detail-priority-record]");
        if (prioritySelect) {
          assignPriority(prioritySelect.dataset.detailPriorityRecord, prioritySelect.value, { reopenDetail: true });
        }
      });
      $("detailModal").addEventListener("input", handleMentionInput);
      $("detailModal").addEventListener("submit", (event) => {
        const form = event.target.closest("[data-comment-form]");
        if (!form) return;
        event.preventDefault();
        submitInlineComment(form);
      });
      $("detailModal").addEventListener("paste", (event) => {
        if ($("modalEditPanel").hidden || !event.target.closest("#modalEditPanel")) return;
        const clipboardFiles = Array.from(event.clipboardData?.items || [])
          .filter((item) => item.kind === "file")
          .map((item) => item.getAsFile())
          .filter(Boolean);
        const directFiles = Array.from(event.clipboardData?.files || []);
        addEditFiles([...clipboardFiles, ...directFiles], "粘贴");
      });
      ["dragenter", "dragover"].forEach((name) => {
        $("detailModal").addEventListener(name, (event) => {
          if ($("modalEditPanel").hidden) return;
          event.preventDefault();
          $("modalEditPanel").querySelector(".upload-zone")?.classList.add("drag-over");
        });
      });
      ["dragleave", "drop"].forEach((name) => {
        $("detailModal").addEventListener(name, (event) => {
          if ($("modalEditPanel").hidden) return;
          event.preventDefault();
          if (name === "drop") addEditFiles(event.dataTransfer?.files || [], "拖入");
          $("modalEditPanel").querySelector(".upload-zone")?.classList.remove("drag-over");
        });
      });
      $("detailModal").addEventListener("keydown", handleMentionKeydown);
      $("mentionMenu").addEventListener("mousedown", (event) => {
        const option = event.target.closest("[data-mention-name]");
        if (!option) return;
        event.preventDefault();
        insertMention(option.dataset.mentionName);
      });
      $("tagMenu").addEventListener("click", (event) => {
        const deleteButton = event.target.closest("[data-tag-delete-confirm]");
        if (deleteButton) {
          event.preventDefault();
          const { recordId, tagLabel } = tagMenuState;
          closeTagMenu();
          deleteAutoTag(recordId, tagLabel);
          return;
        }
        const optionButton = event.target.closest("[data-tag-option]");
        if (optionButton) {
          event.preventDefault();
          const recordId = tagMenuState.recordId;
          const label = optionButton.dataset.tagOption || "";
          closeTagMenu();
          addAutoTag(recordId, label);
        }
      });
      $("tagMenu").addEventListener("submit", (event) => {
        const form = event.target.closest("[data-tag-add-form]");
        if (!form) return;
        event.preventDefault();
        const recordId = tagMenuState.recordId;
        const label = form.elements.tag?.value || "";
        closeTagMenu();
        addAutoTag(recordId, label);
      });
      document.addEventListener("mousedown", (event) => {
        if (event.target.closest("#mentionMenu") || isMentionInput(event.target)) return;
        closeMentionMenu();
      });
      document.addEventListener("mousedown", (event) => {
        if (event.target.closest("#tagMenu") || event.target.closest("[data-add-tag-record]")) return;
        closeTagMenu();
      });
      window.addEventListener("resize", () => {
        if (mentionState.input) positionMentionMenu(mentionState.input);
      });
      window.addEventListener("scroll", () => {
        if (mentionState.input) positionMentionMenu(mentionState.input);
      }, true);
      $("deleteRecordButton").addEventListener("click", deleteCurrentRecord);
      $("closeMediaModal").addEventListener("click", closeMediaPreview);
      $("mediaModal").addEventListener("click", (event) => {
        if (event.target.id === "mediaModal") closeMediaPreview();
      });
      $("notificationToast").addEventListener("click", (event) => {
        if (event.target.closest("#closeNotificationToast")) {
          state.notificationToastDismissedAt = Number(state.unreadCount || 0);
          updateNotificationChrome();
          return;
        }
        if (event.target.closest("#openNotificationCenter")) {
          openNotificationCenter();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && $("mediaModal").classList.contains("show")) closeMediaPreview();
      });
      $("topSubmit").addEventListener("click", () => {
        if (state.navMode === "planner-table") {
          refreshPlatformData();
          return;
        }
        openSubmitModal();
      });
      $("authWidget").addEventListener("click", (event) => {
        if (event.target.closest("#loginButton") && state.authConfigured) {
          window.location.href = "/api/auth/feishu/login";
        }
        if (event.target.closest("#logoutButton")) {
          logout();
        }
      });
      document.querySelectorAll(".nav button").forEach((button) => {
        button.addEventListener("click", () => handleSidebarNavigation(button));
      });
      $("closeSubmitModal").addEventListener("click", closeSubmitModal);
      $("cancelSubmit").addEventListener("click", closeSubmitModal);
      $("submitModal").addEventListener("click", (event) => {
        if (event.target.id === "submitModal") closeSubmitModal();
      });
      $("submitDescription").addEventListener("input", updateDescriptionCounter);
      $("submitDescription").addEventListener("paste", (event) => {
        const clipboardFiles = Array.from(event.clipboardData?.items || [])
          .filter((item) => item.kind === "file")
          .map((item) => item.getAsFile())
          .filter(Boolean);
        const directFiles = Array.from(event.clipboardData?.files || []);
        addSubmitFiles([...clipboardFiles, ...directFiles], "粘贴");
      });
      $("submitFiles").addEventListener("change", (event) => {
        addSubmitFiles(event.target.files || [], "添加");
        $("submitFiles").value = "";
      });
      ["dragenter", "dragover"].forEach((name) => {
        $("submitModal").addEventListener(name, (event) => {
          event.preventDefault();
          $("submitModal").querySelector(".upload-zone").classList.add("drag-over");
        });
      });
      ["dragleave", "drop"].forEach((name) => {
        $("submitModal").addEventListener(name, (event) => {
          event.preventDefault();
          if (name === "drop") addSubmitFiles(event.dataTransfer?.files || [], "拖入");
          $("submitModal").querySelector(".upload-zone").classList.remove("drag-over");
        });
      });
      $("submitFileList").addEventListener("click", (event) => {
        const index = event.target.closest("button")?.dataset.fileIndex;
        if (index === undefined) return;
        const [removed] = submitState.files.splice(Number(index), 1);
        if (removed) releaseSubmitFilePreview(removed);
        renderSubmitFiles();
      });
      $("submitForm").addEventListener("submit", submitFeedback);
      $("replies").addEventListener("click", (event) => {
        const openButton = event.target.closest("[data-open-record]");
        if (!openButton) return;
        openDetail(openButton.dataset.openRecord);
      });
      $("tagCounts").addEventListener("click", (event) => {
        const tagButton = event.target.closest("[data-sidebar-tag]");
        if (!tagButton) return;
        state.search = "";
        state.planner = "";
        state.tagFilter = tagButton.dataset.sidebarTag;
        state.activeTab = "all";
        state.page = 1;
        $("searchInput").value = "";
        $("plannerFilter").value = "";
        $("tagFilter").value = state.tagFilter;
        document.querySelectorAll(".tab").forEach((item) => item.classList.toggle("active", item.dataset.filter === "all"));
        renderFeed();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
      $("moreReplies").addEventListener("click", () => {
        state.activeTab = "all";
        document.querySelectorAll(".tab").forEach((item) => item.classList.toggle("active", item.dataset.filter === "all"));
        state.page = 1;
        renderFeed();
      });
    }

    async function init() {
      await loadAllData();
      renderFeed();
      bindEvents();
      openSubmitModal();
    }

    init().catch((error) => {
      console.error(error);
      $("feed").innerHTML = `<div class="empty-state">加载失败：${escapeHtml(error.message)}</div>`;
    });
  </script>
</body>
</html>
