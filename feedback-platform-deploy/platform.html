<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>X03 反馈平台</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --panel: #ffffff;
      --line: #e5eaf3;
      --text: #172033;
      --muted: #667085;
      --soft: #f1f5fb;
      --blue: #2168f3;
      --blue-soft: #eaf1ff;
      --red: #ef4444;
      --green: #16a34a;
      --orange: #f97316;
      --purple: #7c3aed;
      --shadow: 0 12px 32px rgba(16, 24, 40, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 248px minmax(720px, 1fr) 300px;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1a73ff, #38a3ff);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(33, 104, 243, 0.28);
    }

    .brand b {
      display: block;
      font-size: 16px;
    }

    .brand span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .nav {
      display: grid;
      gap: 7px;
    }

    .nav button {
      height: 38px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #344054;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
      position: relative;
    }

    .nav button.active {
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 700;
    }

    .nav button.has-unread::after {
      content: "";
      position: absolute;
      right: 10px;
      top: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 3px #fff;
    }

    .nav svg {
      width: 17px;
      height: 17px;
      stroke-width: 2;
      flex: 0 0 auto;
    }

    .profile {
      margin-top: auto;
      border-top: 1px solid var(--line);
      padding-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a7f3d0, #60a5fa);
    }

    .profile b {
      display: block;
      font-size: 14px;
    }

    .profile span {
      color: var(--muted);
      font-size: 12px;
    }

    .main {
      padding: 24px 28px 40px;
      min-width: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .topbar > div:first-child {
      flex: 1 1 100%;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      font-size: 14px;
    }

    .submit {
      border: 0;
      height: 48px;
      padding: 0 18px;
      border-radius: 11px;
      background: var(--blue);
      color: white;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(33, 104, 243, 0.28);
      white-space: nowrap;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .submit:hover {
      transform: translateY(-1px);
    }

    .submit:focus-visible {
      outline: 3px solid rgba(245, 158, 11, .28);
      outline-offset: 3px;
    }

    .submit svg {
      flex: 0 0 auto;
    }

    .submit.submit-cta {
      position: relative;
      height: 54px;
      min-width: 176px;
      padding: 0 26px 0 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, #2563eb 0%, #14b8a6 100%);
      box-shadow: 0 16px 32px rgba(37, 99, 235, .24), 0 0 0 1px rgba(255, 255, 255, .45) inset;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0;
      overflow: hidden;
      justify-content: center;
      order: 1;
    }

    .submit.submit-cta::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 13px;
      background: linear-gradient(110deg, rgba(255, 255, 255, .42), rgba(255, 255, 255, 0) 34%);
      pointer-events: none;
    }

    .submit.submit-cta:hover {
      box-shadow: 0 20px 38px rgba(37, 99, 235, .3), 0 0 0 1px rgba(255, 255, 255, .55) inset;
    }

    .submit.submit-cta svg {
      width: 22px;
      height: 22px;
      padding: 7px;
      border-radius: 999px;
      background: #fff;
      color: #2563eb;
      box-sizing: content-box;
      stroke-width: 3.2;
      box-shadow: 0 8px 18px rgba(37, 99, 235, .2), 0 0 0 1px rgba(255, 255, 255, .72);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-start;
      flex: 1 1 100%;
    }

    .auth-widget {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #475467;
      font-size: 13px;
      order: 2;
    }

    .auth-card {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px 0 8px;
      box-shadow: 0 6px 14px rgba(16, 24, 40, 0.05);
    }

    .auth-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 900;
    }

    .auth-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .auth-action {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #344054;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    .auth-action.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .auth-action:disabled {
      cursor: not-allowed;
      opacity: 0.68;
    }

    .toolbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 12px;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 150px 150px 130px;
      gap: 12px;
      margin-bottom: 18px;
    }

    .search {
      position: relative;
    }

    .search svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #98a2b3;
      width: 18px;
      height: 18px;
    }

    .toolbar input,
    .toolbar select {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: #344054;
      padding: 0 12px;
      outline: none;
    }

    .toolbar input {
      padding-left: 42px;
    }

    .tabs {
      display: flex;
      gap: 26px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
    }

    .tab {
      border: 0;
      background: transparent;
      padding: 0 0 12px;
      color: #475467;
      cursor: pointer;
      font-weight: 700;
      position: relative;
    }

    .tab.active {
      color: var(--blue);
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      border-radius: 2px;
      background: var(--blue);
    }

    .my-attention-tabs {
      display: none;
      gap: 10px;
      flex-wrap: wrap;
      margin: -2px 0 18px;
    }

    .my-attention-tabs.show {
      display: flex;
    }

    .my-attention-tab {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #475467;
      padding: 8px 13px;
      cursor: pointer;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .my-attention-tab span {
      color: var(--muted);
      font-weight: 700;
    }

    .my-attention-tab.active {
      border-color: #bcd0ff;
      background: #eef4ff;
      color: var(--blue);
    }

    .feed {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 11px;
      overflow: hidden;
      box-shadow: var(--shadow);
      container-type: inline-size;
    }

    .app.settings-view {
      grid-template-columns: 248px minmax(0, 1fr);
    }

    .app.planner-view {
      grid-template-columns: 248px minmax(0, 1fr);
    }

    .app.settings-view .right,
    .app.planner-view .right,
    .main.settings-mode .submit,
    .main.settings-mode .toolbar,
    .main.settings-mode .tabs,
    .main.settings-mode .my-attention-tabs,
    .main.settings-mode .pager,
    .main.planner-mode .toolbar,
    .main.planner-mode .tabs,
    .main.planner-mode .my-attention-tabs,
    .main.planner-mode .pager {
      display: none;
    }

    .main.settings-mode .topbar,
    .main.planner-mode .topbar {
      display: block;
      margin-bottom: 22px;
    }

    .main.settings-mode .feed,
    .main.planner-mode .feed {
      background: transparent;
      border: 0;
      border-radius: 0;
      overflow: visible;
      box-shadow: none;
    }

    .section-kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 24px;
      border-radius: 12px;
      padding: 0 12px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .settings-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
    }

    .notification-settings-layout {
      grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
      align-items: start;
    }

    .settings-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 24px;
      min-height: 400px;
      box-shadow: 0 10px 24px rgba(16, 24, 40, 0.04);
    }

    .settings-card h2 {
      margin: 0 0 26px;
      font-size: 18px;
      line-height: 1.35;
    }

    .preference-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 19px 0;
      border-bottom: 1px solid var(--line);
    }

    .preference-row:last-child {
      border-bottom: 0;
    }

    .preference-row b {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .preference-row p {
      margin: 0;
      color: #5b667a;
      font-size: 13px;
    }

    .settings-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 0;
      border-radius: 8px;
      background: #2457d6;
      color: #fff;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .settings-action:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .sync-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: #eef4ff;
      color: #2457d6;
      font-size: 13px;
      font-weight: 700;
    }

    .settings-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .team-role-switches {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .team-role-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #475467;
      font-size: 13px;
      white-space: nowrap;
    }

    .settings-action.secondary {
      background: #eef4ff;
      color: #2457d6;
    }

    .settings-action.danger {
      background: #df3f3f;
    }

    .writeback-log {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px 0;
      border-top: 1px solid var(--line);
    }

    .writeback-log:first-child {
      border-top: 0;
    }

    .writeback-log b {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .writeback-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: #5b667a;
      font-size: 12px;
      line-height: 1.45;
    }

    .log-tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #edf2f7;
      color: #5b667a;
      font-size: 12px;
      font-weight: 800;
    }

    .log-tag.failed {
      background: #ffe8e8;
      color: #c92f2f;
    }

    .log-tag.synced {
      background: #e8f7ee;
      color: #168444;
    }

    .log-tag.pending,
    .log-tag.skipped {
      background: #fff4d8;
      color: #9a6500;
    }

    .writeback-error {
      margin-top: 6px;
      color: #c92f2f;
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
    }

    .switch {
      position: relative;
      width: 34px;
      height: 20px;
      display: inline-flex;
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .switch span {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #cfd7e6;
      cursor: pointer;
      transition: 0.16s ease;
    }

    .switch span::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.22);
      transition: 0.16s ease;
    }

    .switch input:checked + span {
      background: var(--blue);
    }

    .switch input:checked + span::after {
      transform: translateX(14px);
    }

    .notification-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }

    .notification-head h2 {
      margin-bottom: 6px;
    }

    .notification-head p {
      margin: 0;
      color: #667085;
      font-size: 13px;
    }

    .read-all {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #344054;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .notification-list {
      display: grid;
      gap: 10px;
    }

    .notification-item {
      border: 1px solid #bfd2ff;
      background: #f3f7ff;
      border-radius: 8px;
      padding: 13px;
    }

    button.notification-item {
      width: 100%;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    button.notification-item:hover {
      border-color: #7aa2ff;
      background: #edf4ff;
    }

    .notification-item.read {
      border-color: var(--line);
      background: #fbfdff;
      opacity: 0.78;
    }

    .notification-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #667085;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .notification-type {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid #bfd2ff;
      background: #fff;
      color: #344054;
      border-radius: 7px;
      padding: 2px 8px;
      font-weight: 700;
    }

    .notification-title {
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.45;
    }

    .notification-body {
      color: #5b667a;
      font-size: 13px;
    }

    .notification-action {
      display: inline-flex;
      margin-top: 10px;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 800;
    }

    .planner-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 18px;
    }

    .planner-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .summary-card {
      border: 1px solid transparent;
      background: #fff;
      border-radius: 10px;
      min-height: 86px;
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(16, 24, 40, 0.04);
    }

    .summary-card.active {
      border-color: var(--blue);
      background: #f5f8ff;
    }

    .summary-icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: #eef4ff;
      color: var(--blue);
    }

    .summary-card:nth-child(2) .summary-icon { background: #fef9c3; color: #a16207; }
    .summary-card:nth-child(3) .summary-icon { background: #e0f2fe; color: #0369a1; }
    .summary-card:nth-child(4) .summary-icon { background: #dcfce7; color: #047857; }

    .summary-number {
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
    }

    .summary-label {
      margin-top: 6px;
      color: #667085;
      font-size: 13px;
    }

    .planner-filter-panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdff;
      padding: 16px;
      margin-bottom: 20px;
    }

    .planner-filter-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .planner-filters {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 150px 150px 150px 150px 88px;
      gap: 12px;
    }

    .planner-filters input,
    .planner-filters select,
    .planner-filters button {
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: #344054;
      padding: 0 12px;
      outline: none;
      font: inherit;
    }

    .planner-filters button {
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    .planner-table-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      overflow: auto;
      box-shadow: 0 10px 24px rgba(16, 24, 40, 0.04);
    }

    .planner-table {
      width: 100%;
      min-width: 1480px;
      border-collapse: collapse;
      font-size: 13px;
    }

    .planner-table th,
    .planner-table td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    .planner-table th {
      background: #fbfdff;
      font-weight: 800;
      color: #344054;
      white-space: nowrap;
    }

    .planner-table tr:last-child td {
      border-bottom: 0;
    }

    .planner-group-row td {
      background: #f8fbff;
      color: #344054;
      font-weight: 900;
      padding: 10px 16px;
      border-top: 1px solid #dbe7ff;
      border-bottom: 1px solid #dbe7ff;
    }

    .planner-group-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .planner-group-label span {
      color: var(--muted);
      font-weight: 700;
    }

    .planner-group-toggle {
      width: 26px;
      height: 26px;
      border: 1px solid #c8d8ff;
      border-radius: 8px;
      background: #fff;
      color: #2457d6;
      cursor: pointer;
      display: inline-grid;
      place-items: center;
      font-weight: 900;
      line-height: 1;
    }

    .table-planner-select {
      width: 148px;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #344054;
      padding: 0 9px;
      outline: none;
      font: inherit;
      cursor: pointer;
    }

    .table-planner-select:disabled {
      cursor: progress;
      opacity: 0.68;
    }

    .planner-filter-picker {
      min-width: 0;
    }

    .planner-filter-picker .planner-picker-button {
      height: 40px;
      min-height: 40px;

    .tag-menu-empty {

    .detail-comment-list {

    .detail-comment-form {

    .detail-comment {

      border-radius: 9px;

      background: #fbfdff;
    }

    .detail-comment-meta {

      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;

      align-items: center;
      gap: 8px;

    .detail-comment-meta b {
      color: #344054;
      font-size: 13px;
    }

    .detail-comment-body {
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .assets {

      place-items: center;

    .asset video {

      height: 100%;
      object-fit: contain;
      display: block;
    }

    .asset-info {
      padding: 9px;
      font-size: 12px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .asset-info a {
      display: inline-block;
      margin-top: 4px;
      color: var(--blue);
      text-decoration: none;
    }

    .detail-edit-panel {
      border: 1px solid #d8e4ff;
      border-radius: 12px;

      padding: 16px;

      gap: 16px;

      display: none;
    }

    .detail-edit-panel .description-input {
      min-height: 170px;
      background: #fff;
    }

    .edit-asset-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

      position: relative;
      width: 112px;
      height: 112px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
    }

      opacity: 0.42;
    }

    .edit-asset-preview {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: #eef2f7;
      color: #667085;
      font-size: 12px;
      font-weight: 800;
    }

    .edit-asset-preview img,
    .edit-asset-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .edit-asset button {
      position: absolute;
      top: 6px;
      right: 6px;
      min-width: 44px;
      height: 24px;
      border: 0;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.76);
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    .edit-asset-name {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px 7px 6px;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0), rgba(15, 23, 42, 0.76));
      color: #fff;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-edit-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .detail-actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .danger-action {
      height: 36px;
      border: 1px solid #fecdd3;
      border-radius: 8px;
      background: #fff1f2;
      color: #be123c;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 800;
    }

    .danger-action:hover {
      background: #ffe4e6;
    }

    .danger-action:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .media-dialog {
      width: min(980px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.28);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .media-head {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px 0 16px;
      color: #f8fafc;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .media-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
      font-size: 14px;
    }

    .media-close {
      border: 0;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      cursor: pointer;
      font-size: 20px;
    }

    .media-body {
      min-height: 220px;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .media-body img,
    .media-body video {
      max-width: 100%;
      max-height: calc(100vh - 112px);
      object-fit: contain;
      display: block;
    }

    .media-body video {
      width: 100%;
      background: #000;
    }

    .empty-state {
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 38px;
      text-align: center;
      color: var(--muted);
    }

      width: min(720px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
    }

    .submit-head {
      padding: 24px 24px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .submit-head h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.35;
    }

    .submit-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .submit-body {
      padding: 24px;
    }

    .form-row {
      margin-bottom: 22px;
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      font-weight: 700;
      color: #172033;
    }

    .required {
      color: var(--red);
    }

    .type-options {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .type-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .type-option span {
      height: 42px;
      padding: 0 18px;
      border-radius: 21px;
      border: 1px solid #d8dee8;
      background: #f3f5f8;
      color: #667085;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.16s ease;
    }

    .type-option input:checked + span {

      background: var(--blue);
      color: #fff;
      box-shadow: 0 10px 22px rgba(33, 104, 243, 0.22);
    }

    .type-option svg {
      width: 17px;
      height: 17px;
    }

    .description-input {
      width: 100%;
      min-height: 160px;
      resize: vertical;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      padding: 13px 14px;
      color: #344054;
      outline: none;
      line-height: 1.6;
    }

    .description-input:focus {
      border-color: #8ab2ff;
      box-shadow: 0 0 0 3px rgba(33, 104, 243, 0.1);
    }

    .form-help {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .upload-zone {
      width: 96px;
      height: 96px;
      border: 1px dashed #cfd7e6;
      border-radius: 10px;
      background: #fbfcff;
      display: grid;
      place-items: center;
      color: #667085;
      cursor: pointer;
      text-align: center;
      gap: 4px;
    }

    .upload-zone.drag-over {
      border-color: var(--blue);
      background: #eff6ff;
      color: var(--blue);
    }

    .upload-zone svg {
      width: 24px;
      height: 24px;
      margin: 0 auto 5px;
    }

    .upload-zone b {
      display: block;
      color: #475467;
      font-size: 13px;
      margin-bottom: 3px;
    }

    .upload-zone span {
      font-size: 11px;
    }

    .attachment-input-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }

    .file-list {
      display: flex;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 0;
      min-width: 0;
      flex: 1 1 260px;
    }

    .file-chip {
      position: relative;
      width: 96px;
      height: 96px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0;
      background: #f8fafc;
      overflow: hidden;
      color: #475467;
      font-size: 12px;
      min-width: 0;
    }

    .file-preview {
      width: 100%;
      height: 100%;
      background: #eef2f7;
      display: grid;
      place-items: center;
    }

    .file-preview img,
    .file-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .file-preview-fallback {
      font-weight: 900;
      color: #667085;
    }

    .file-chip span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: block;
      padding: 15px 7px 6px;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0), rgba(15, 23, 42, 0.76));
      color: #fff;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-chip button {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 0;
      background: rgba(15, 23, 42, 0.72);
      color: #fff;
      cursor: pointer;
      padding: 0;
      font-size: 16px;
      line-height: 1;
    }

    .submit-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 28px;
    }

    .ghost-action,
    .primary-action {
      height: 38px;
      border-radius: 19px;
      cursor: pointer;
      font-weight: 700;
    }

    .ghost-action {
      border: 1px solid #d8dee8;
      background: #fff;
      color: #172033;
    }

    .primary-action {
      border: 0;
      background: var(--blue);
      color: #fff;
    }

    .primary-action:disabled {
      cursor: not-allowed;
      opacity: 0.64;
    }

    .form-message {
      min-height: 20px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .form-message.error {
      color: var(--red);
    }

    .form-message.success {
      color: var(--green);
    }

    .notification-toast {
      position: fixed;
      left: 22px;
      bottom: 22px;
      z-index: 60;
      width: min(420px, calc(100vw - 44px));
      border: 1px solid #c7d7fe;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 18px 44px rgba(16, 24, 40, 0.18);
      padding: 14px;
      display: none;
      overflow: hidden;
    }

    .notification-toast.show {
      display: block;
      animation: toastIn 180ms ease-out;
    }

    .toast-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .toast-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
    }

    .toast-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 4px #fee2e2;
    }

    .toast-close {
      border: 0;
      background: #f2f5fa;
      color: #475467;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      cursor: pointer;
    }

    .toast-marquee {
      border: 1px solid #edf1f7;
      border-radius: 9px;
      background: #fbfdff;
      overflow: hidden;
      white-space: nowrap;
      color: #344054;
      font-size: 13px;
      line-height: 34px;
      margin-bottom: 12px;
    }

    .toast-marquee span {
      display: inline-block;
      min-width: 100%;
      padding-left: 100%;
      animation: marquee 18s linear infinite;
    }

    .toast-action {
      border: 0;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      height: 34px;
      padding: 0 12px;
      cursor: pointer;
      font-weight: 800;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }

    @media (min-width: 1440px) {
      .main {
        padding-left: 34px;
        padding-right: 34px;
      }

      .item h2 {
        font-size: 18px;
      }

      .item.has-attachments .item-main {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .attachment-thumbs {
        --thumb-size: clamp(72px, 4vw, 86px);
      }
    }

    @media (max-width: 980px) {
      .settings-layout,
      .notification-settings-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 1180px) {
      .app {
        grid-template-columns: 86px minmax(0, 1fr);
      }

      .sidebar {
        padding: 18px 14px;
      }

      .brand div,
      .nav span,
      .profile div {
        display: none;
      }

      .right {
        display: none;
      }
    }

    @media (max-width: 780px) {
      .app {
        display: block;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        flex-direction: row;
        align-items: center;
      }

      .nav,
      .profile {
        display: none;

  <script>
    const FIELD = {
      description: "fldHy9HQO9",

    };

    const state = {
      records: [],
      activeTab: "hot",
      myAttentionScope: "proposed",
      search: "",
      planner: "",
      tagFilter: "",
      priority: "",
      sort: "updated",
      navMode: "plaza",
      notificationSettings: [],
      notifications: [],
      unreadCount: 0,
      notificationToastDismissedAt: 0,
      currentUser: null,
      authConfigured: false,
      authRedirectUrl: "",
      syncStatus: {},
      teamMembers: [],
      plannerOptions: [],
      writebackLogs: [],
      showWritebackLogs: false,
      deletedRecordIds: [],
      interactions: {},
      activeCommentRecord: "",

      plannerScope: "all",
      plannerSearch: "",
      plannerOwner: "",
      plannerStatus: [],
      plannerPriority: "",

      pageSize: 100
    };
    const submitState = { files: [], previewUrls: new Map() };
    const editState = { files: [], previewUrls: new Map(), keepAttachmentIds: new Set() };
    const plannerNoteTimers = new Map();
    const mentionState = { input: null, triggerIndex: -1, query: "", activeIndex: 0, options: [] };
    const tagMenuState = { recordId: "", tagLabel: "", mode: "" };

    const $ = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[m]));
    const strip = (value) => String(value ?? "").replace(/\s+/g, " ").trim();
    const PLAZA_MODULES = ["系统", "战斗", "其他", "平台BUG"];
    const HOT_TAB_STATUSES = ["未处理", "设计中", "后续版本处理", "未填"];
    const PLANNER_STATUS_OPTIONS = ["未填", "未处理", "处理中", "策划已采纳", "设计中", "后续版本处理", "不处理（附上说明）", "重复问题", "缺方案", "已处理", "已关闭"];
    const PLANNER_PRIORITY_OPTIONS = ["未填", "P0", "P1", "P2", "P3"];
    const PLANNER_NAME_ALIASES = {
      "张泽臻(小萨)": "张泽臻",
      "王宇轩（实习）": "王宇轩",
      "王宇轩(实习)": "王宇轩"
    };

    function normalizePlazaModule(value) {
      const text = strip(value).replace(/模块$/, "");
      if (text === "系统") return "系统";
      if (text === "战斗") return "战斗";
      if (text === "其他") return "其他";
      if (text === "平台BUG") return "平台BUG";
      return "";
    }
    function normalizePlannerName(value) {
      const text = strip(value);
      return PLANNER_NAME_ALIASES[text] || text;
    }
    const normalizeEmpty = (value) => value || "未填";
    const personInitial = (name) => Array.from(strip(name || "未"))[0] || "未";
    const renderPersonIdentity = (name, variant = "") => {
      const displayName = strip(name || "未分配");
      const className = ["person-identity", variant].filter(Boolean).join(" ");
      return `<span class="${className}" title="${escapeHtml(displayName)}"><span class="person-avatar">${escapeHtml(personInitial(displayName))}</span><span class="person-name">${escapeHtml(displayName)}</span></span>`;
    };
    const sizeLabel = (bytes) => {
      const n = Number(bytes || 0);
      if (!n) return "";
      return n > 1024 * 1024 ? `${(n / 1024 / 1024).toFixed(1)}MB` : `${Math.round(n / 1024)}KB`;
    };
    const dateLabel = (value) => {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      const pad = (n) => String(n).padStart(2, "0");
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    };
    const timestampValue = (value) => {
      const time = Date.parse(value || "");
      return Number.isNaN(time) ? 0 : time;
    };
    const attachmentPathFromStatus = (value) => {
      const normalized = String(value || "").replace(/\\/g, "/");
      const marker = "/attachments/";
      const markerIndex = normalized.lastIndexOf(marker);
      if (markerIndex >= 0) return normalized.slice(markerIndex + 1);
      if (normalized.startsWith("attachments/")) return normalized;
      return "";
    };

    const AUTO_TAG_RULES = [
      { label: "文案", match: /文案|文本|错别字|描述|说明|命名|翻译|标点|措辞|字体|排版|单位|英文|tips?/i },
      { label: "UI/HUD", match: /HUD|UI|界面|按钮|图标|弹窗|面板|血条|护盾|显示|提示|浮窗|头像|标识|高亮|遮挡|字号|布局|选中|页签|菜单|排行榜|活动页面/i },
      { label: "体验建议", kind: true, match: /建议|希望|最好|可以|不必要|没有必要|优化|调整|参考|感觉|期望|应该|需要|想要|希望可以|不习惯|不好看|不太好/i },
      { label: "战斗", match: /战斗|攻击|普攻|技能|大招|buff|BUFF|单位|敌人|怪|兵|伤害|仇恨|施法|冷却|打击|大锤|塔|守卫|怪物/i },
      { label: "操作交互", match: /点击|点选|选择|拖拽|响应|操作|手感|控制|取消|确认|切换|选中|快捷键|鼠标|键盘|前往|目的地|移动|复制|toast/i },
      { label: "地图", match: /地图|地块|地格|寻路|路径|路线|路点|坐标|墙|边界|阻挡|视野外|位置|目的地|迷雾|城内|城外|高台/i },
      { label: "资源经济", match: /资源|金币|木材|矿|采集|产出|消耗|经济|商店|购买|售卖|奖励|结算|生产线|生产效率/i },
      { label: "视觉表现", match: /美术|特效|动画|动作|模型|材质|颜色|表现|镜头|视野|光效|阴影|画面|红点|图素|粗糙|截图分享/i },
      { label: "疑似Bug", kind: true, match: /bug|错误|异常|失效|失败|不响应|无响应|无法|不能|没法|卡住|卡死|崩溃|闪退|消失|丢失|不生效|不可用|没反应|很奇怪/i },
      { label: "信息不清晰", kind: true, match: /不清楚|不明确|看不懂|看不清|很难联想|难以理解|无法判断|提示不足|缺少提示|没有提示|引导不足|不知道|定位|不易发现|意识不到/i },
      { label: "数值平衡", match: /数值|伤害|血量|护甲|强度|平衡|太高|太低|过强|过弱|倍率|价格|消耗|收益|概率|评分|效率/i },
      { label: "任务引导", match: /任务|引导|教程|新手|目标|流程|步骤|说明|开荒|主线|支线|章节/i },
      { label: "性能卡顿", match: /卡顿|掉帧|帧率|延迟|加载|性能|内存|发热|慢|卡一下|耗时/i },
      { label: "音频音效", match: /音效|声音|音频|BGM|音乐|语音|听|裁剪范围|声源/i }
    ];

    const AUTO_TAG_CLASSES = {
      "文案": "tag-copy",
      "UI/HUD": "tag-ui",
      "体验建议": "tag-advice",
      "战斗": "tag-combat",
      "操作交互": "tag-action",
      "地图": "tag-map",
      "资源经济": "tag-economy",
      "视觉表现": "tag-visual",
      "疑似Bug": "tag-bug",
      "信息不清晰": "tag-clarity",
      "数值平衡": "tag-balance",
      "任务引导": "tag-task",
      "性能卡顿": "tag-performance",
      "音频音效": "tag-audio"
    };

    function classifyFeedback(record) {
      const attachmentNames = (record.attachments || []).map((asset) => asset.name || asset.fieldName || "").join(" ");
      const sourceText = [
        record.title,
        record.description,
        record.remark,
        record.planner,
        record.module,
        attachmentNames
      ].map(strip).join(" ");
      const tags = AUTO_TAG_RULES
        .filter((rule) => rule.match.test(sourceText))
        .map((rule) => ({ label: rule.label, kind: Boolean(rule.kind) }));
      const seen = new Set();
      return tags.filter((tag) => {
        if (seen.has(tag.label)) return false;
        seen.add(tag.label);
        return true;
      }).slice(0, 7);
    }

    function renderAutoTags(record, options = {}) {
      const tags = record.autoTags || [];
      const limit = options.limit || tags.length;
      return tags.slice(0, limit).map((tag) => {
        const label = typeof tag === "string" ? tag : tag.label;
        const kind = typeof tag === "object" && tag.kind;
        const colorClass = AUTO_TAG_CLASSES[label] || "";
        const deleteAttrs = options.deletable
          ? ` data-detail-auto-tag="${escapeHtml(label)}" data-detail-auto-tag-record="${escapeHtml(record.recordId)}" title="右键删除标签"`
          : "";
        return `<span class="pill auto-tag ${kind ? "kind" : ""} ${colorClass}"${deleteAttrs}>${escapeHtml(label)}</span>`;
      }).join("");
    }

    function tagSuggestionOptions(record) {
      const currentLabels = new Set((record?.autoTags || []).map((tag) => strip(typeof tag === "string" ? tag : tag.label)).filter(Boolean));
      const suggestions = [];
      const seen = new Set(currentLabels);
      const remember = (label) => {
        const value = strip(label);
        if (!value || seen.has(value)) return;
        suggestions.push(value);
        seen.add(value);
      };
      AUTO_TAG_RULES.forEach((rule) => remember(rule.label));
      Object.values(state.interactions || {}).forEach((interaction) => {
        (interaction.custom_auto_tags || []).forEach(remember);
      });
      return suggestions;
    }

    function isAcceptedSubmitFile(file) {
      return /^(image\/|video\/)/.test(file.type)
        || /\.(gif|jpg|jpeg|png|webp|bmp|mp4|mov|webm|m4v)$/i.test(file.name || "");
    }

    function submitFileSignature(file) {
      return [
        file.name || "",
        file.type || "",
        file.size || 0,
        file.lastModified || 0
      ].join("::");
    }

    function uniqueSubmitFiles(files, relaxed = false) {
      const signatureFor = (file) => relaxed
        ? [file.type || "", file.size || 0].join("::")
        : submitFileSignature(file);
      const seen = new Set(submitState.files.map(signatureFor));
      return Array.from(files || []).filter((file) => {
        if (!file) return false;
        const signature = signatureFor(file);
        if (seen.has(signature)) return false;
        seen.add(signature);
        return true;
      });
    }

    function normalizeClipboardFile(file, index) {
      if (file.name) return file;
      const isVideo = /^video\//.test(file.type);
      const extension = (file.type.split("/")[1] || (isVideo ? "mp4" : "png")).replace("jpeg", "jpg");
      const prefix = isVideo ? "pasted-video" : "pasted-image";
      return new File([file], `${prefix}-${Date.now()}-${index + 1}.${extension}`, {
        type: file.type || (isVideo ? "video/mp4" : "image/png"),
        lastModified: file.lastModified || Date.now()
      });
    }

    function addSubmitFiles(files, sourceLabel = "添加") {
      const incoming = uniqueSubmitFiles(files, sourceLabel === "粘贴").map(normalizeClipboardFile);
      if (!incoming.length) return false;
      const accepted = incoming.filter(isAcceptedSubmitFile);
      const availableSlots = Math.max(0, 9 - submitState.files.length);
      const added = accepted.slice(0, availableSlots);
      submitState.files = [...submitState.files, ...added];
      renderSubmitFiles();

      if (incoming.length !== accepted.length) {
        showSubmitMessage("仅支持图片、GIF 和视频文件。", "error");
      } else if (accepted.length > added.length || submitState.files.length >= 9) {
        showSubmitMessage("最多保留 9 个附件。");
      } else if (added.length) {
        showSubmitMessage(`已${sourceLabel} ${added.length} 个附件。`);
      } else {
        showSubmitMessage("");
      }
      return added.length > 0;
    }

    function applyInteractions(records) {
      return records.map((record) => {
        const interaction = state.interactions[record.recordId] || {};
        const comments = interaction.comments || [];
        const dbLikeCount = Number(interaction.like_count || 0);
        const assignedPlanner = interaction.assigned_planner || "";
        const basePlanner = record.basePlanner ?? record.planner;
        const assignedStatus = interaction.assigned_status || "";
        const baseStatus = record.baseStatus ?? record.status;
        const assignedPriority = interaction.assigned_priority || "";
        const basePriority = record.basePriority ?? record.priority;
        const updatedTime = dateLabel(interaction.last_updated_at) || record.updatedTime || record.createdTime;
        const hiddenAutoTags = new Set(interaction.hidden_auto_tags || []);
        const mergedAutoTags = [];
        const seenAutoTags = new Set();
        (record.autoTags || []).forEach((tag) => {
          const label = strip(typeof tag === "string" ? tag : tag.label);
          if (!label || hiddenAutoTags.has(label) || seenAutoTags.has(label)) return;
          mergedAutoTags.push(tag);
          seenAutoTags.add(label);
        });
        (interaction.custom_auto_tags || []).forEach((tagLabel) => {
          const label = strip(tagLabel);
          if (!label || hiddenAutoTags.has(label) || seenAutoTags.has(label)) return;
          mergedAutoTags.push({ label });
          seenAutoTags.add(label);
        });
        return {
          ...record,
          basePlanner,
          baseStatus,
          basePriority,
          baseLikeCount: record.baseLikeCount ?? record.likeCount,
          baseCommentCount: record.baseCommentCount ?? record.commentCount,
          planner: assignedPlanner || basePlanner,
          status: assignedStatus || baseStatus,
          priority: assignedPriority || basePriority,
          assignedPlanner,
          assignedPlannerKey: interaction.assigned_planner_key || "",
          assignedStatus,
          assignedPriority,
          updatedTime,
          likeCount: Number(record.baseLikeCount ?? record.likeCount ?? 0) + dbLikeCount,
          commentCount: comments.length,
          likedByMe: Boolean(interaction.liked_by_me),
          localLikedUsers: interaction.liked_users || [],
          followedByMe: Boolean(interaction.followed_by_me),
          followCount: Number(interaction.follow_count || 0),
          plannerNote: interaction.planner_note || "",
          plannerNoteAuthorKey: interaction.planner_note_author_key || "",
          plannerNoteAuthorName: interaction.planner_note_author_name || "",
          plannerNoteDirtyAt: interaction.planner_note_dirty_at || "",
          plannerNoteSyncAfter: interaction.planner_note_sync_after || "",
          plannerNoteSyncedAt: interaction.planner_note_synced_at || "",
          autoTags: mergedAutoTags,
          hiddenAutoTags: [...hiddenAutoTags],
          comments
        };
      });
    }

    async function loadAllData() {

        fetch("records_raw.json", { cache: "no-store" }),

      const payload = (await recordsResponse.json()).data;
      const statusRows = parseCsv(await statusResponse.text());
      const statusByToken = new Map(statusRows.map((row) => [row.file_token, row]));
      const [platformRecords] = await Promise.all([
        loadPlatformFeedback(),
        loadNotificationSettings(),
        loadCurrentUser(),
        loadSyncStatus()
      ]);
      await loadTeamMembers();
      await loadWritebackLogs();
      state.interactions = await loadRecordInteractions();
      state.deletedRecordIds = await loadDeletedRecords();
      const deletedIds = new Set(state.deletedRecordIds);
      state.records = applyInteractions([
        ...platformRecords,
        ...payload.data.map((row, index) => toRecord(row, index, payload, statusByToken))
      ].filter((record) => !deletedIds.has(record.recordId)));
      fillFilters();
      renderRightPanel();
    }
